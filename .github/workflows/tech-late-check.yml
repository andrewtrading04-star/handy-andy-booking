name: Tech lateness check

# Alerts a late tech + staff (Heather/Joey) when a booking is 30+ minutes past
# its scheduled start and nobody tapped "On my way" yet. Runs every 10 minutes
# (Vercel Hobby cron only fires once/day, which is why this lives in GitHub
# Actions — same pattern as appointment-reminders.yml). GitHub's own scheduler
# is best-effort for high-frequency crons — under load a run can land 10-20+
# minutes late or get skipped entirely (the next run catches it, since the
# 24h lookback in tech-late.js keeps a booking eligible) — so treat "30
# minutes late" as the trigger threshold, not a delivery guarantee; the real
# text can land anywhere from ~30 to ~60 minutes after the missed start.
#
# `concurrency` below makes overlapping runs QUEUE instead of running side by
# side — the endpoint's per-recipient send-then-mark isn't atomic, so two
# genuinely concurrent runs could both see a booking as unalerted and each
# send their own copy of every text before either one marks it done.
concurrency:
  group: tech-late-check
  cancel-in-progress: false
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (UTC) — always the real thing, texts go out
  workflow_dispatch:          # manual "Run workflow" from the Actions tab — defaults to a
    inputs:                   # safe report-only test; uncheck the box to send real texts.
      dry:
        description: 'Dry run (report only — no texts sent)'
        type: boolean
        default: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tech lateness check
        run: |
          DRY_PARAM=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry }}" != "false" ]; then
            DRY_PARAM="&dry=1"
          fi
          curl -fsS --retry 3 --retry-delay 5 -X GET \
            "https://handy-andy-booking.vercel.app/api/migrate?action=tech_late_check${DRY_PARAM}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
