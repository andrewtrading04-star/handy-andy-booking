name: Daily booking digest

# ONE nightly summary email of every appointment booked that day (replaces the
# per-booking "someone just booked" alerts). Runs HOURLY — GitHub's scheduled
# runs are best-effort and routinely slip by hours, and a fixed 02:00/03:00 UTC
# pair missed the 8 PM Denver window on late nights (no email at all). The
# endpoint sends once/day: tonight's from 8 PM Denver on, with an overnight
# catch-up if every evening run was delayed, and a Resend idempotency key so the
# many hourly attempts deliver exactly one email — correct across MDT/MST.

on:
  schedule:
    - cron: '0 * * * *'   # every hour (UTC); the endpoint gates + dedupes
  workflow_dispatch:
    inputs:
      force:
        description: 'Send now regardless of the hour (1 = yes)'
        required: false
        default: ''

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send the daily booking digest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          Q="action=daily_digest"
          if [ -n "$FORCE" ]; then Q="$Q&force=1"; fi
          curl -fsS --retry 3 --retry-delay 5 -X POST "https://handy-andy-booking.vercel.app/api/migrate?$Q" \
            -H "Authorization: Bearer $CRON_SECRET"
          echo ""
