name: Bracket inventory tracker

# Reads unread Walmart order emails from Gmail, parses bracket types and
# quantities, and pushes each order to the HAD CRM via /api/bracket-sync.
# Runs every 15 minutes so deliveries appear in the dashboard quickly.
# The sync endpoint is idempotent — duplicate runs are harmless.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:
    inputs:
      order:
        description: 'Manually set status for this Walmart order # (optional)'
        required: false
        default: ''
      status:
        description: 'Status to set: in_route | delivered | canceled'
        required: false
        default: ''
      purge_orders:
        description: 'Delete these Amazon plate order #s (comma-separated). Skips the email scan.'
        required: false
        default: ''
      add_zip:
        description: 'Add a service-area zip: "zip,area,surcharge,payout" (e.g. 80027,Denver,65,50). Skips the email scan.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Manual status override (optional)
        if: ${{ github.event.inputs.order != '' && github.event.inputs.status != '' }}
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ORDERS: ${{ github.event.inputs.order }}
          STATUS: ${{ github.event.inputs.status }}
        run: |
          IFS=',' read -ra LIST <<< "$ORDERS"
          for o in "${LIST[@]}"; do
            o="$(echo "$o" | xargs)"   # trim whitespace
            [ -z "$o" ] && continue
            echo "Setting $o -> $STATUS"
            curl -fsS -X POST "https://handy-andy-booking.vercel.app/api/migrate?action=bracket_sync" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"walmart_order_num\":\"$o\",\"status\":\"$STATUS\"}"
            echo ""
          done

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install email parsing dependencies
        run: npm install --no-save imapflow mailparser

      - name: Sync Walmart bracket orders from Gmail
        env:
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          # Optional second mailbox (e.g. domstvmounting@gmail.com, where the
          # Walmart orders actually arrive). Leave unset to scan only the primary.
          GMAIL_USER_2:          ${{ secrets.GMAIL_USER_2 }}
          GMAIL_APP_PASSWORD_2:  ${{ secrets.GMAIL_APP_PASSWORD_2 }}
          # Optional third mailbox (e.g. houstonhandyandy@gmail.com, where the
          # Amazon wire-concealment-plate orders arrive).
          GMAIL_USER_3:          ${{ secrets.GMAIL_USER_3 }}
          GMAIL_APP_PASSWORD_3:  ${{ secrets.GMAIL_APP_PASSWORD_3 }}
          # Handy Andy Google-review notification inboxes (see
          # scripts/lib/gmb-locations.mjs). Each holds the "you just received a
          # Google review" emails for one or more HA listings; scanning them is
          # how HA reviews flow into google_reviews, exactly like Dom's do.
          #   _4 houstonmainbusiness@gmail.com  (Houston #1 + #2)
          #   _5 denvermainbusiness@gmail.com   (Denver #1)
          #   _6 denverinstallpros@gmail.com    (Denver #2)
          #   _7 austinmainbusiness@gmail.com   (Austin)
          GMAIL_USER_4:          ${{ secrets.GMAIL_USER_4 }}
          GMAIL_APP_PASSWORD_4:  ${{ secrets.GMAIL_APP_PASSWORD_4 }}
          GMAIL_USER_5:          ${{ secrets.GMAIL_USER_5 }}
          GMAIL_APP_PASSWORD_5:  ${{ secrets.GMAIL_APP_PASSWORD_5 }}
          GMAIL_USER_6:          ${{ secrets.GMAIL_USER_6 }}
          GMAIL_APP_PASSWORD_6:  ${{ secrets.GMAIL_APP_PASSWORD_6 }}
          GMAIL_USER_7:          ${{ secrets.GMAIL_USER_7 }}
          GMAIL_APP_PASSWORD_7:  ${{ secrets.GMAIL_APP_PASSWORD_7 }}
          # Optional override for the Amazon product-match regex (set once the
          # exact plate product title is known, to keep matching strict).
          AMAZON_PLATE_MATCH:    ${{ secrets.AMAZON_PLATE_MATCH }}
          CRON_SECRET:           ${{ secrets.CRON_SECRET }}
          # One-off purge of phantom Amazon plate orders (manual dispatch only).
          # When set, the script deletes these orders and skips the email scan.
          PURGE_ORDERS:          ${{ github.event.inputs.purge_orders }}
          # One-off add/re-tier of a service-area zip (manual dispatch only).
          # "zip,area,surcharge,payout"; when set the script seeds it and skips the scan.
          ADD_ZIP:               ${{ github.event.inputs.add_zip }}
        run: node scripts/bracket-email-sync.mjs
