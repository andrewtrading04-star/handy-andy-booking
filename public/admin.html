<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Booking Admin</title>
<style>
  :root{
    --navy:#0A1628; --navy-2:#0f2036; --navy-3:#16304f; --orange:#FF6B35; --orange-d:#e85a28;
    --ink:#e8eef6; --mute:#8aa0bd; --line:#1d3552; --card:#0f2036;
    --green:#27c093; --red:#ff5d5d; --amber:#ffb020; --blue:#4aa3ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--navy);color:var(--ink);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  .hidden{display:none !important;}

  /* Login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,.45);}
  .login h1{font-size:20px;margin-bottom:4px;}
  .login .sub{color:var(--mute);font-size:13px;margin-bottom:22px;}
  .login input{width:100%;background:var(--navy);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:13px 14px;font-size:15px;margin-bottom:12px;}
  .login input:focus{outline:none;border-color:var(--orange);}
  .btn{background:var(--orange);color:#fff;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-weight:700;width:100%;}
  .btn:hover{background:var(--orange-d);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mute);font-weight:600;}
  .btn.sm{width:auto;padding:7px 12px;font-size:13px;border-radius:8px;}
  .err{color:var(--red);font-size:13px;margin-top:6px;min-height:18px;}

  /* App chrome */
  .topbar{position:sticky;top:0;z-index:20;background:var(--navy-2);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--orange);}
  .switcher{display:flex;gap:6px;margin-left:4px;flex-wrap:wrap;}
  .switcher button{background:transparent;border:1px solid var(--line);color:var(--mute);padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;}
  .switcher button.on{background:var(--orange);border-color:var(--orange);color:#fff;}
  .spacer{flex:1;}
  .who{font-size:12px;color:var(--mute);}
  .tabs{display:flex;gap:4px;padding:8px 16px 0;overflow-x:auto;background:var(--navy-2);border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:19;}
  .tabs button{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--mute);padding:10px 14px;font-size:14px;font-weight:600;white-space:nowrap;}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--orange);}
  .wrap{max-width:1100px;margin:0 auto;padding:16px;}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .kpi .l{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;}
  .kpi .v{font-size:23px;font-weight:800;margin-top:4px;}

  /* Cards / list */
  .section-title{font-size:13px;color:var(--mute);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 10px;}
  .job{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
  .job .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;}
  .job .name{font-weight:700;font-size:15px;}
  .job .meta{color:var(--mute);font-size:13px;margin-top:3px;line-height:1.5;}
  .job .time{font-weight:700;font-size:14px;text-align:right;white-space:nowrap;}
  .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  select.assign,select.filter{background:var(--navy);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-size:13px;}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:capitalize;}
  .b-pending{background:rgba(255,176,32,.16);color:var(--amber);}
  .b-confirmed{background:rgba(74,163,255,.16);color:var(--blue);}
  .b-assigned{background:rgba(74,163,255,.16);color:var(--blue);}
  .b-on_the_way,.b-arrived,.b-in_progress{background:rgba(255,107,53,.18);color:var(--orange);}
  .b-completed{background:rgba(39,192,147,.16);color:var(--green);}
  .b-cancelled,.b-no_show{background:rgba(255,93,93,.16);color:var(--red);}
  .t-status{font-size:11px;font-weight:700;}
  .dot-s{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}
  .s-available{background:var(--green);} .s-on_job{background:var(--orange);} .s-off{background:var(--mute);}
  .search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:12px 14px;font-size:15px;margin-bottom:14px;}
  .search:focus{outline:none;border-color:var(--orange);}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;color:var(--mute);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px;border-bottom:1px solid var(--line);}
  td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
  .empty{color:var(--mute);text-align:center;padding:40px 0;}
  .stars{color:var(--amber);}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy-3);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:14px;box-shadow:0 12px 30px rgba(0,0,0,.4);z-index:50;}
</style>
</head>
<body>

<!-- ───────── Login ───────── -->
<div id="login" class="login-wrap">
  <form class="login" id="loginForm">
    <h1>Booking Admin</h1>
    <div class="sub">Enter your password to continue</div>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" autofocus>
    <button class="btn" type="submit">Sign in</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<!-- ───────── App ───────── -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand"><span class="dot"></span><span id="bizName">Admin</span></div>
    <div class="switcher" id="switcher"></div>
    <div class="spacer"></div>
    <span class="who" id="who"></span>
    <button class="btn sm" id="newBookingBtn">＋ New</button>
    <button class="btn ghost sm" id="logout">Log out</button>
  </div>
  <div class="tabs" id="tabs">
    <button data-tab="today" class="on">Today</button>
    <button data-tab="bookings">Bookings</button>
    <button data-tab="customers">Customers</button>
    <button data-tab="technicians">Technicians</button>
  </div>
  <div class="wrap" id="view"></div>
</div>

<!-- New booking modal -->
<div id="modal" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:24px 14px;">
  <div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;width:100%;max-width:460px;">
    <h2 style="font-size:17px;margin-bottom:14px;">New Booking</h2>
    <form id="nbForm" style="display:grid;gap:10px;">
      <input class="search" style="margin:0" id="nbName" placeholder="Customer name *">
      <div style="display:flex;gap:8px;"><input class="search" style="margin:0" id="nbPhone" placeholder="Phone *"><input class="search" style="margin:0" id="nbEmail" placeholder="Email"></div>
      <input class="search" style="margin:0" id="nbAddr" placeholder="Street address">
      <div style="display:flex;gap:8px;"><input class="search" style="margin:0" id="nbCity" placeholder="City"><input class="search" style="margin:0;max-width:70px" id="nbState" placeholder="ST"><input class="search" style="margin:0;max-width:90px" id="nbZip" placeholder="ZIP"></div>
      <select class="search" style="margin:0" id="nbService"></select>
      <select class="search" style="margin:0" id="nbTech"></select>
      <div style="display:flex;gap:8px;"><input class="search" style="margin:0" type="datetime-local" id="nbWhen"><input class="search" style="margin:0;max-width:120px" id="nbPrice" placeholder="$ Price" inputmode="decimal"></div>
      <textarea class="search" style="margin:0;min-height:60px" id="nbNotes" placeholder="Notes / special instructions"></textarea>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn" type="submit">Create booking</button>
        <button class="btn ghost" type="button" id="nbCancel">Cancel</button>
      </div>
      <div class="err" id="nbErr"></div>
    </form>
  </div>
</div>

<script>
const API = '/api/admin';
let token = localStorage.getItem('ha_admin_token') || '';
let role = localStorage.getItem('ha_admin_role') || '';
let businesses = JSON.parse(localStorage.getItem('ha_admin_biz') || '[]');
let current = null;           // current business object
let tab = 'today';
let pollTimer = null;

// ── API helper ───────────────────────────────────────────────────────────
async function api(action, { method='GET', params={}, body=null } = {}) {
  const url = new URL(API, location.origin);
  url.searchParams.set('action', action);
  for (const [k,v] of Object.entries(params)) if (v!=null && v!=='') url.searchParams.set(k, v);
  const res = await fetch(url, {
    method,
    headers: { 'Content-Type':'application/json', ...(token && { Authorization:`Bearer ${token}` }) },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { logout(); throw new Error('Session expired — please sign in again'); }
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ── Auth ─────────────────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const errEl = document.getElementById('loginErr'); errEl.textContent='';
  try {
    const d = await api('login', { method:'POST', body:{ password: document.getElementById('pw').value } });
    token=d.token; role=d.role; businesses=d.businesses;
    localStorage.setItem('ha_admin_token',token);
    localStorage.setItem('ha_admin_role',role);
    localStorage.setItem('ha_admin_biz',JSON.stringify(businesses));
    enterApp();
  } catch(err){ errEl.textContent = err.message; }
});

function logout(){
  token=''; role=''; businesses=[]; current=null;
  localStorage.removeItem('ha_admin_token'); localStorage.removeItem('ha_admin_role'); localStorage.removeItem('ha_admin_biz');
  if(pollTimer) clearInterval(pollTimer);
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
}
document.getElementById('logout').addEventListener('click', logout);

function enterApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent = role==='owner' ? 'Owner' : 'Secretary';
  current = businesses[0] || null;
  renderSwitcher();
  selectTab('today');
}

function renderSwitcher(){
  const el = document.getElementById('switcher');
  el.innerHTML = businesses.map(b =>
    `<button data-slug="${b.slug}" class="${current&&b.slug===current.slug?'on':''}">${esc(b.name)}</button>`).join('');
  el.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{
    current = businesses.find(b=>b.slug===btn.dataset.slug);
    renderSwitcher(); selectTab(tab);
  }));
}

// ── Tabs ─────────────────────────────────────────────────────────────────
document.getElementById('tabs').querySelectorAll('button').forEach(b=>
  b.addEventListener('click',()=>selectTab(b.dataset.tab)));

function selectTab(t){
  tab=t;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  document.getElementById('bizName').textContent = current ? current.name : 'Admin';
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
  if(t==='today'){ renderToday(); pollTimer=setInterval(()=>{ if(tab==='today') renderToday(true); }, 20000); }
  else if(t==='bookings') renderBookings();
  else if(t==='customers') renderCustomers();
  else if(t==='technicians') renderTechnicians();
}

function fmtTime(iso){
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleString('en-US',{ timeZone:current.timezone, weekday:'short', hour:'numeric', minute:'2-digit' }); }
  catch{ return new Date(iso).toLocaleString(); }
}
function money(n){ return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function stars(n){ return n ? '<span class="stars">'+'★'.repeat(n)+'</span>' : ''; }

// ── Today ────────────────────────────────────────────────────────────────
let techCache = [];
async function renderToday(silent){
  const view=document.getElementById('view');
  if(!silent) view.innerHTML='<div class="empty">Loading…</div>';
  try{
    const d = await api('summary', { params:{ business: current.slug } });
    techCache = d.technicians;
    const techOpts = (selId)=>['<option value="">— Unassigned —</option>',
      ...d.technicians.map(t=>`<option value="${t.id}" ${t.id===selId?'selected':''}>${esc(t.name)}</option>`)].join('');

    const kpis = `
      <div class="kpis">
        <div class="kpi"><div class="l">Revenue Today</div><div class="v">${money(d.revenue.today)}</div></div>
        <div class="kpi"><div class="l">This Week</div><div class="v">${money(d.revenue.week)}</div></div>
        <div class="kpi"><div class="l">This Month</div><div class="v">${money(d.revenue.month)}</div></div>
        <div class="kpi"><div class="l">Today's Jobs</div><div class="v">${d.counts.todayTotal}</div></div>
        <div class="kpi"><div class="l">Unassigned</div><div class="v">${d.counts.unassigned}</div></div>
      </div>`;

    const techStrip = `<div class="section-title">Technicians</div>
      <div class="job"><div style="display:flex;gap:18px;flex-wrap:wrap;">${
        d.technicians.map(t=>`<span class="t-status"><span class="dot-s s-${t.status}"></span>${esc(t.name)} · ${t.status.replace('_',' ')}</span>`).join('') || '<span class="empty">No technicians</span>'
      }</div></div>`;

    const jobs = d.today.length ? d.today.map(b=>jobCard(b, techOpts)).join('')
      : '<div class="empty">No jobs scheduled today.</div>';

    view.innerHTML = kpis + techStrip + `<div class="section-title">Today's Jobs</div>` + jobs;
    bindJobCards();
  }catch(err){ if(!silent) view.innerHTML=`<div class="empty">${esc(err.message)}</div>`; }
}

function jobCard(b, techOpts){
  const canAssign = !['cancelled','completed','no_show'].includes(b.status);
  return `<div class="job" data-id="${b.id}">
    <div class="row">
      <div>
        <div class="name">${esc(b.customer?.name||'Customer')} <span class="badge b-${b.status}">${b.status.replace(/_/g,' ')}</span></div>
        <div class="meta">${esc(b.service?.name||'Service')}${b.price?' · '+money(b.price):''}<br>${esc(b.address||'')}
        ${b.customer?.phone?'<br>☎ '+esc(b.customer.phone):''}
        ${b.customer_notes?'<br>📝 '+esc(b.customer_notes):''}
        ${b.review_rating?'<br>'+stars(b.review_rating):''}</div>
      </div>
      <div class="time">${fmtTime(b.scheduled_at)}</div>
    </div>
    <div class="actions">
      ${canAssign?`<select class="assign" data-act="assign">${techOpts(b.technician_id)}</select>`:''}
      ${b.status==='pending'?`<button class="btn sm" data-act="confirm">Confirm</button>`:''}
      ${canAssign?`<button class="btn ghost sm" data-act="reschedule">Reschedule</button>`:''}
      ${canAssign?`<button class="btn ghost sm" data-act="cancel">Cancel</button>`:''}
    </div>
  </div>`;
}

function bindJobCards(){
  document.querySelectorAll('.job[data-id]').forEach(card=>{
    const id=card.dataset.id;
    const sel=card.querySelector('select.assign');
    if(sel) sel.addEventListener('change',()=>updateBooking({ id, action:'assign', technician_id: sel.value||null }));
    card.querySelectorAll('button[data-act]').forEach(btn=>btn.addEventListener('click',async()=>{
      const act=btn.dataset.act;
      if(act==='confirm') await updateBooking({ id, action:'confirm' });
      if(act==='cancel'){ if(confirm('Cancel this booking?')) await updateBooking({ id, action:'cancel' }); }
      if(act==='reschedule'){
        const v=prompt('New date & time (YYYY-MM-DD HH:MM):');
        if(v){ const iso=new Date(v.replace(' ','T')).toISOString(); await updateBooking({ id, action:'reschedule', scheduled_at: iso }); }
      }
    }));
  });
}

async function updateBooking(payload){
  try{ await api('booking_update',{ method:'POST', body:{ business:current.slug, ...payload }}); toast('Updated'); selectTab(tab); }
  catch(err){ toast(err.message); }
}

// ── Bookings ─────────────────────────────────────────────────────────────
async function renderBookings(){
  const view=document.getElementById('view');
  view.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <select class="filter" id="rangeF">
        <option value="today">Today</option><option value="week">This Week</option>
        <option value="upcoming" selected>Upcoming</option><option value="all">All</option>
      </select>
      <select class="filter" id="statusF">
        <option value="">All statuses</option>
        <option>pending</option><option>confirmed</option><option>assigned</option>
        <option>on_the_way</option><option>arrived</option><option>in_progress</option>
        <option>completed</option><option>cancelled</option><option>no_show</option>
      </select>
    </div><div id="blist"><div class="empty">Loading…</div></div>`;
  const load=async()=>{
    const list=document.getElementById('blist');
    try{
      const d=await api('bookings',{ params:{ business:current.slug, range:document.getElementById('rangeF').value, status:document.getElementById('statusF').value }});
      list.innerHTML = d.bookings.length ? d.bookings.map(b=>`
        <div class="job"><div class="row">
          <div><div class="name">${esc(b.customer?.name||'Customer')} <span class="badge b-${b.status}">${b.status.replace(/_/g,' ')}</span></div>
          <div class="meta">${esc(b.service?.name||'')} · ${esc(b.technician?.name||'Unassigned')}<br>${esc(b.address||'')}</div></div>
          <div class="time">${fmtTime(b.scheduled_at)}<br>${money(b.price)}</div>
        </div></div>`).join('') : '<div class="empty">No bookings.</div>';
    }catch(err){ list.innerHTML=`<div class="empty">${esc(err.message)}</div>`; }
  };
  document.getElementById('rangeF').addEventListener('change',load);
  document.getElementById('statusF').addEventListener('change',load);
  load();
}

// ── Customers ────────────────────────────────────────────────────────────
async function renderCustomers(){
  const view=document.getElementById('view');
  view.innerHTML = `<input class="search" id="custSearch" placeholder="Search name, phone, email, address…">
    <div id="clist"><div class="empty">Loading…</div></div>`;
  const load=async(q)=>{
    const list=document.getElementById('clist');
    try{
      const d=await api('customers',{ params:{ business:current.slug, q }});
      list.innerHTML = d.customers.length ? `<table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Location</th></tr></thead><tbody>${
        d.customers.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.phone||'')}</td><td>${esc(c.email||'')}</td><td>${esc([c.city,c.state,c.postal_code].filter(Boolean).join(', '))}</td></tr>`).join('')
      }</tbody></table>` : '<div class="empty">No customers found.</div>';
    }catch(err){ list.innerHTML=`<div class="empty">${esc(err.message)}</div>`; }
  };
  let t; document.getElementById('custSearch').addEventListener('input',e=>{ clearTimeout(t); t=setTimeout(()=>load(e.target.value),300); });
  load('');
}

// ── Technicians ──────────────────────────────────────────────────────────
async function renderTechnicians(){
  const view=document.getElementById('view');
  view.innerHTML='<div class="empty">Loading…</div>';
  try{
    const d=await api('technicians',{ params:{ business:current.slug }});
    view.innerHTML = d.technicians.map(t=>`
      <div class="job" data-id="${t.id}">
        <div class="row">
          <div><div class="name"><span class="dot-s s-${t.status}"></span>${esc(t.name)}</div>
            <div class="meta">${esc(t.phone||'no phone set')} · PIN ${t.pin_set?'set ✓':'<span style="color:var(--amber)">not set</span>'} · ${t.active?'active':'inactive'}</div></div>
          <select class="assign tstatus"><option value="available" ${t.status==='available'?'selected':''}>available</option>
            <option value="on_job" ${t.status==='on_job'?'selected':''}>on job</option>
            <option value="off" ${t.status==='off'?'selected':''}>off</option></select>
        </div>
        <div class="actions">
          <button class="btn ghost sm" data-act="phone">Set phone</button>
          <button class="btn ghost sm" data-act="pin">Set PIN</button>
          <button class="btn ghost sm" data-act="toggle">${t.active?'Deactivate':'Activate'}</button>
        </div>
      </div>`).join('') || '<div class="empty">No technicians.</div>';

    view.querySelectorAll('.job[data-id]').forEach(card=>{
      const id=card.dataset.id;
      card.querySelector('.tstatus').addEventListener('change',e=>saveTech({ id, status:e.target.value }));
      card.querySelectorAll('button[data-act]').forEach(btn=>btn.addEventListener('click',()=>{
        if(btn.dataset.act==='phone'){ const p=prompt('Phone number for login:'); if(p!=null) saveTech({ id, phone:p }); }
        if(btn.dataset.act==='pin'){ const p=prompt('New 4-digit PIN:'); if(p){ if(!/^\d{4}$/.test(p)) return toast('PIN must be 4 digits'); saveTech({ id, pin:p }); } }
        if(btn.dataset.act==='toggle'){ saveTech({ id, active: btn.textContent==='Activate' }); }
      }));
    });
  }catch(err){ view.innerHTML=`<div class="empty">${esc(err.message)}</div>`; }
}
async function saveTech(payload){
  try{ await api('technician_update',{ method:'POST', body:{ business:current.slug, ...payload }}); toast('Saved'); renderTechnicians(); }
  catch(err){ toast(err.message); }
}

// ── New booking modal ──────────────────────────────────────────────────────
document.getElementById('newBookingBtn').addEventListener('click', openNewBooking);
document.getElementById('nbCancel').addEventListener('click', ()=>document.getElementById('modal').classList.add('hidden'));
async function openNewBooking(){
  if(!current) return;
  const modal=document.getElementById('modal');
  document.getElementById('nbErr').textContent='';
  document.getElementById('nbForm').reset();
  // populate services + technicians for current business
  try{
    const [svc, tech] = await Promise.all([
      api('services',{ params:{ business:current.slug }}),
      techCache.length ? Promise.resolve({technicians:techCache}) : api('technicians',{ params:{ business:current.slug }}),
    ]);
    document.getElementById('nbService').innerHTML='<option value="">— Service —</option>'+
      svc.services.map(s=>`<option value="${s.id}" data-price="${s.base_price}">${esc(s.name)} ($${s.base_price})</option>`).join('');
    document.getElementById('nbTech').innerHTML='<option value="">— Unassigned —</option>'+
      tech.technicians.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');
  }catch(err){ document.getElementById('nbErr').textContent=err.message; }
  modal.classList.remove('hidden');
}
document.getElementById('nbService').addEventListener('change',e=>{
  const p=e.target.selectedOptions[0]?.dataset.price; if(p && !document.getElementById('nbPrice').value) document.getElementById('nbPrice').value=p;
});
document.getElementById('nbForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('nbErr'); err.textContent='';
  const name=document.getElementById('nbName').value.trim();
  const phone=document.getElementById('nbPhone').value.trim();
  if(!name && !phone){ err.textContent='Name or phone required'; return; }
  const whenVal=document.getElementById('nbWhen').value;
  const scheduled_at = whenVal ? new Date(whenVal).toISOString() : null;
  try{
    await api('booking_create',{ method:'POST', body:{
      business: current.slug,
      customer:{ name, phone, email:document.getElementById('nbEmail').value.trim(),
        address_line1:document.getElementById('nbAddr').value.trim(),
        city:document.getElementById('nbCity').value.trim(),
        state:document.getElementById('nbState').value.trim(),
        postal_code:document.getElementById('nbZip').value.trim() },
      service_id: document.getElementById('nbService').value || null,
      technician_id: document.getElementById('nbTech').value || null,
      scheduled_at,
      price: parseFloat(document.getElementById('nbPrice').value)||0,
      notes: document.getElementById('nbNotes').value.trim()||null,
    }});
    document.getElementById('modal').classList.add('hidden');
    toast('Booking created'); selectTab(tab);
  }catch(e2){ err.textContent=e2.message; }
});

// ── Boot ─────────────────────────────────────────────────────────────────
async function tryAutoLogin(){
  // If the server is in no-password dev mode, log in automatically as owner.
  try{
    const d = await api('login', { method:'POST', body:{ password:'' } });
    token=d.token; role=d.role; businesses=d.businesses;
    localStorage.setItem('ha_admin_token',token);
    localStorage.setItem('ha_admin_role',role);
    localStorage.setItem('ha_admin_biz',JSON.stringify(businesses));
    enterApp();
  }catch{ /* password required — leave the login screen visible */ }
}
if(token && businesses.length) enterApp();
else tryAutoLogin();
