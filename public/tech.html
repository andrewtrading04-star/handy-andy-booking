<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Tech App</title>
<link rel="icon" type="image/svg+xml" href="/favicon-tech.svg">
<link rel="apple-touch-icon" href="/favicon-tech.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome 6 (Free Solid & Regular) — used for Doms iconography -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer">
<style>
  :root{--navy:#0A1628;--navy-2:#0f2036;--navy-3:#16304f;--orange:#FF6B35;--orange-d:#e85a28;
    --ink:#e8eef6;--mute:#8aa0bd;--line:#1d3552;--green:#27c093;--red:#ff5d5d;--amber:#ffb020;--blue:#4aa3ff;
    /* Type system — Plus Jakarta Sans, weights 400–900 */
    --font-sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --fs-hero:clamp(32px,9vw,44px); --fs-h1:clamp(24px,6vw,30px); --fs-h2:20px;
    --fs-h3:18px; --fs-body:15px; --fs-sm:14px;
    /* Gradient keyword highlight (bright for dark navy bg) */
    --grad:linear-gradient(120deg,#ffb347 0%,#ff7a3d 50%,#ff4d7d 100%);}
  /* Doms brand palette — applied via body.doms for Doms technicians (e.g. Gregory, TK).
     Remaps the accent away from Handy Andy orange to Doms primary blue (#0047AB),
     all in blue tones — no orange. */
  body.doms{--orange:#0047AB;--orange-d:#003580;
    --grad:linear-gradient(120deg,#4d8dff 0%,#2563eb 55%,#0047AB 100%);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-sans);background:var(--navy);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
  button{font-family:inherit;cursor:pointer;}
  .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  .hidden{display:none !important;}
  .wrap{max-width:520px;margin:0 auto;min-height:100vh;}

  /* Login */
  .login{padding:40px 24px;display:flex;flex-direction:column;min-height:100vh;justify-content:center;}
  .login h1{font-size:var(--fs-h1);font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .login .dot{width:12px;height:12px;border-radius:50%;background:var(--orange);}
  .login .sub{color:var(--mute);font-size:14px;margin-bottom:26px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  input{width:100%;background:var(--navy-2);border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:15px 16px;font-size:17px;}
  input:focus{outline:none;border-color:var(--orange);}
  #pin{letter-spacing:10px;text-align:center;font-size:24px;}
  .btn{background:var(--orange);color:#fff;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:700;width:100%;}
  .btn:hover{background:var(--orange-d);} .btn:disabled{opacity:.5;}
  .btn.big{padding:18px;font-size:18px;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);font-weight:600;}
  .btn.green{background:var(--green);} .btn.blue{background:var(--blue);}
  .err{color:var(--red);font-size:14px;margin-top:10px;text-align:center;min-height:20px;}

  /* Header */
  /* A gap ABOVE the header box (page background shows through) so it isn't
     jammed against the top edge / status bar. */
  #jobsView{padding-top:calc(18px + env(safe-area-inset-top, 0px));}
  /* Critical field alert (e.g. a job with no address on file) — impossible to miss. */
  .crit-alert{background:#b91c1c;border:2px solid #ff6b6b;border-radius:12px;padding:14px 16px;margin:0 0 12px;color:#fff;animation:critpulse 1.4s ease-in-out infinite;}
  .crit-alert .ca-h{font-size:12px;font-weight:900;letter-spacing:.09em;text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:5px;opacity:.95;}
  .crit-alert .ca-b{font-size:15.5px;font-weight:800;line-height:1.4;}
  .crit-alert a.ca-call{display:inline-block;margin-top:11px;background:#fff;color:#b91c1c;font-weight:900;text-decoration:none;padding:10px 18px;border-radius:9px;font-size:15px;}
  @keyframes critpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.55);}50%{box-shadow:0 0 0 9px rgba(239,68,68,0);}}
  @media(prefers-reduced-motion:reduce){.crit-alert{animation:none;}}
  .hdr{position:sticky;top:0;background:var(--navy-2);border-bottom:1px solid var(--line);padding:16px 18px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center;z-index:10;gap:8px;}
  .hdr .name{font-weight:800;font-size:17px;}
  .hdr .sub{font-size:12px;color:var(--mute);}
  .hdr button{background:transparent;border:1px solid var(--line);color:var(--mute);padding:7px 12px;border-radius:8px;font-size:13px;}
  .hdr button:hover{border-color:var(--ink);color:var(--ink);}
  .hdr-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}

  /* Week calendar strip */
  .weekbar{background:var(--navy-2);border-bottom:1px solid var(--line);padding:10px 8px;}
  .weekbar-top{display:flex;justify-content:space-between;align-items:center;padding:0 6px 8px;}
  .weekbar-title{font-size:13px;font-weight:700;color:var(--ink);}
  .weekbar-nav{display:flex;gap:6px;}
  .weekbar-nav button{background:transparent;border:1px solid var(--line);color:var(--mute);width:30px;height:30px;border-radius:8px;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .weekbar-nav button:hover{border-color:var(--ink);color:var(--ink);}
  .weekbar-today{font-size:12px;padding:0 10px !important;width:auto !important;}
  .weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .daycell{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:7px 2px 8px;text-align:center;cursor:pointer;position:relative;min-height:58px;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .daycell:hover{border-color:var(--mute);}
  .daycell.sel{background:var(--orange);border-color:var(--orange);}
  .daycell.sel .dc-dow,.daycell.sel .dc-num{color:#fff;}
  .daycell.today .dc-num{color:var(--orange);font-weight:800;}
  .daycell.sel.today .dc-num{color:#fff;}
  .dc-dow{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
  .dc-num{font-size:16px;font-weight:700;color:var(--ink);line-height:1;}
  .dc-count{font-size:10px;font-weight:700;background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;min-width:18px;}
  .daycell.sel .dc-count{background:rgba(255,255,255,.3);}
  .dc-count.empty{visibility:hidden;}

  /* Job list */
  .list{padding:14px;}
  .jobc{background:var(--navy-2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;}
  .jobc:active{border-color:var(--orange);}
  .jobc .t{font-weight:800;font-size:16px;color:var(--orange);}
  .jobc .n{font-weight:700;font-size:16px;margin-top:4px;}
  .jobc .m{color:var(--mute);font-size:14px;margin-top:4px;line-height:1.5;}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:capitalize;margin-top:8px;}
  .b-assigned{background:rgba(74,163,255,.16);color:var(--blue);}
  .b-on_the_way,.b-arrived,.b-in_progress{background:rgba(255,107,53,.18);color:var(--orange);}
  .b-completed{background:rgba(39,192,147,.16);color:var(--green);}
  .b-confirmed,.b-pending{background:rgba(255,176,32,.16);color:var(--amber);}
  .empty{color:var(--mute);text-align:center;padding:60px 20px;}
  /* Cross-company job (booked by the partner company for this tech) */
  .jobc.xco{border-color:#ffb020;box-shadow:0 0 0 1px #ffb020 inset;}
  .xco-tag{display:inline-block;background:#ffb020;color:#1a1205;font-weight:800;font-size:11px;letter-spacing:.04em;padding:4px 9px;border-radius:7px;margin-bottom:8px;}
  .xco-banner{background:linear-gradient(135deg,#ffb020,#ff8a00);color:#1a1205;border-radius:14px;padding:15px 16px;margin-bottom:12px;border:2px solid #ffd47a;}
  .xco-banner-h{font-weight:900;font-size:16px;letter-spacing:.02em;line-height:1.25;}
  .xco-banner-s{font-weight:600;font-size:13px;margin-top:5px;opacity:.92;}

  /* Detail */
  .detail{padding:16px;}
  .back{background:transparent;border:none;color:var(--orange);font-size:15px;font-weight:600;padding:6px 0;margin-bottom:10px;}
  .card{background:var(--navy-2);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h3{font-size:13px;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .card .big-name{font-size:20px;font-weight:800;}
  .kv{font-size:15px;margin:7px 0;line-height:1.5;}
  .kv a{color:var(--blue);text-decoration:none;}
  /* Doms iconography — Font Awesome 6 glyphs, brand-accented */
  body.doms .kv > i{color:var(--orange);width:18px;text-align:center;margin-right:2px;}
  body.doms .btn.ghost > i{margin-right:4px;}
  /* Doms: blue badge tint instead of the orange one. */
  body.doms .b-on_the_way, body.doms .b-arrived, body.doms .b-in_progress{background:rgba(0,71,171,.16);}
  .notes{background:rgba(255,176,32,.08);border:1px solid rgba(255,176,32,.25);border-radius:10px;padding:12px;color:var(--amber);font-size:15px;line-height:1.5;}
  .statusbar{position:sticky;bottom:0;background:var(--navy);border-top:1px solid var(--line);padding:14px;display:flex;flex-direction:column;gap:10px;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy-3);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:14px;z-index:50;}

  /* Targeted notice banner (e.g. coverage notes for specific techs) */
  .tech-notice{display:flex;align-items:flex-start;gap:10px;margin:0 16px 12px;padding:13px 15px;
    background:rgba(255,176,32,.13);border:1px solid rgba(255,176,32,.40);border-radius:12px;
    color:#ffd98a;font-size:14.5px;font-weight:600;line-height:1.45;}
  .tech-notice .tn-ic{font-size:17px;line-height:1.2;flex:0 0 auto;}
  .tech-notice a{color:#ffd98a;font-weight:800;text-decoration:underline;white-space:nowrap;}
  /* Photos */
  .phreq{float:right;font-size:11px;font-weight:800;letter-spacing:.3px;color:var(--amber);background:rgba(255,176,32,.12);padding:2px 9px;border-radius:12px;text-transform:none;}
  .phreq.ok{color:var(--green);background:rgba(39,192,147,.14);}
  .photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--navy);}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .thumbdel{position:absolute;top:4px;right:4px;width:24px;height:24px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}
  /* Notes */
  .note{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;}
  .note-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .note-a{font-weight:700;font-size:13px;color:var(--ink);}
  .note-t{font-size:12px;color:var(--mute);}
  .note-b{font-size:14px;line-height:1.45;white-space:pre-wrap;word-break:break-word;}
  .note-del{background:transparent;border:none;color:var(--red);font-size:12px;padding:6px 0 0;font-weight:600;}
  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:8px;}
  .lightbox .lb-close{position:fixed;top:16px;right:18px;background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:22px;}
  .streetview{width:100%;height:auto;border-radius:10px;display:block;margin:12px 0;background:var(--navy);aspect-ratio:4/3;}

  /* Availability */
  .avail{padding:16px;}
  .hdr-actions{display:flex;gap:8px;}
  .chips{display:flex;flex-direction:column;gap:8px;}
  .slotchip{width:100%;text-align:left;background:var(--navy);border:1px solid var(--line);color:var(--mute);padding:13px 14px;border-radius:10px;font-size:15px;font-weight:600;}
  .slotchip.on{background:var(--orange);border-color:var(--orange);color:#fff;}
  .slotbonus{display:inline-block;margin-left:8px;background:#16a34a;color:#fff;font-size:11px;font-weight:800;padding:2px 7px;border-radius:999px;vertical-align:middle;letter-spacing:.3px;}
  /* Extra-time-slot pills ("block my next slot") */
  .slotheld{font-size:14px;color:var(--ink);margin-bottom:8px;}
  .slotrow{display:flex;flex-wrap:wrap;gap:8px;}
  .slotpill{display:inline-flex;align-items:center;gap:6px;background:var(--navy);border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:600;padding:7px 10px;border-radius:999px;}
  .slotpill.main{background:var(--orange);border-color:var(--orange);color:#fff;}
  .slotpill-x{background:transparent;border:none;color:var(--mute);font-size:17px;line-height:1;padding:0 2px;font-weight:700;}
  .slotpill-x:hover{color:var(--red);}
</style>
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>
<div class="wrap">

  <!-- Login -->
  <div id="login" class="login">
    <h1><span class="dot"></span>Technician <span class="hl">Login</span></h1>
    <div class="sub">Sign in to see today's jobs</div>
    <form id="loginForm">
      <div class="field"><label>Phone number</label>
        <input type="tel" id="phone" placeholder="(555) 123-4567" autocomplete="username"></div>
      <div class="field"><label>4-digit PIN</label>
        <input type="tel" id="pin" maxlength="4" inputmode="numeric" placeholder="••••" autocomplete="current-password"></div>
      <button class="btn big" type="submit">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>

  <!-- Jobs list -->
  <div id="jobsView" class="hidden">
    <div class="hdr">
      <div><div class="name" id="techName">—</div><div class="sub" id="jobsSub">Today's jobs</div></div>
      <div class="hdr-actions">
        <button id="availBtn">My Availability</button>
        <button id="reviewsBtn">⭐ Reviews</button>
        <button id="payrollBtn">💵 Payroll</button>
        <button id="inventoryBtn">📦 Inventory</button>
        <button id="logout">Log out</button>
      </div>
    </div>
    <div id="critAlert"></div>
    <div id="techNotice" class="tech-notice hidden"></div>
    <div class="weekbar">
      <div class="weekbar-top">
        <div class="weekbar-title" id="weekTitle">—</div>
        <div class="weekbar-nav">
          <button id="weekToday" class="weekbar-today">Today</button>
          <button id="weekPrev" title="Previous week">‹</button>
          <button id="weekNext" title="Next week">›</button>
        </div>
      </div>
      <div class="weekgrid" id="weekGrid"></div>
    </div>
    <div class="list" id="jobsList"></div>
  </div>

  <!-- Job detail -->
  <div id="detailView" class="hidden"></div>

  <!-- Weekly availability -->
  <div id="availabilityView" class="hidden"></div>

  <!-- Payroll -->
  <div id="payrollView" class="hidden"></div>

  <!-- Reviews -->
  <div id="reviewsView" class="hidden"></div>

  <!-- Bracket inventory (read-only) -->
  <div id="inventoryView" class="hidden"></div>

</div>

<!-- Photo lightbox -->
<div id="lightbox" class="lightbox hidden"><button class="lb-close" id="lbClose">×</button><img id="lightboxImg" src="" alt="photo"></div>

<!-- ETA Modal (shown when tech marks job as "on the way") -->
<div id="etaModal" class="lightbox hidden">
  <div style="background:#fff;border-radius:16px;padding:32px;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;">
    <h2 style="font-size:22px;font-weight:800;margin-bottom:8px;color:#222a35;">ETA to arrive?</h2>
    <p style="color:#7a8694;font-size:14px;margin-bottom:24px;">Let the customer know when you'll get there.</p>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <button class="btn" data-eta="30" style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;">30 minutes</button>
      <button class="btn" data-eta="45" style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;">45 minutes</button>
      <button class="btn" data-eta="60" style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;">60 minutes</button>
    </div>
  </div>
</div>

<script>
const API='/api/tech';
// Bulletproof localStorage bootstrap (runs at the very top — must never throw,
// or ALL page JS halts and the login form silently breaks). Guards both storage
// ACCESS throwing (Chrome "block cookies" / iOS private mode) and a corrupt or
// literal-"undefined" value throwing on JSON.parse. Falls back on bad data,
// which also auto-heals a device already bricked this way on its next load.
function lsGet(key){ try{ return localStorage.getItem(key); }catch{ return null; } }
function lsSet(key, val){ try{ localStorage.setItem(key, val); }catch{} }
function lsDel(key){ try{ localStorage.removeItem(key); }catch{} }
function lsJSON(key, fallback){
  const raw=lsGet(key);
  if(raw==null||raw===''||raw==='undefined'||raw==='null') return fallback;
  try{ const v=JSON.parse(raw); return v==null?fallback:v; }
  catch{ lsDel(key); return fallback; }
}
let token=lsGet('ha_tech_token')||'';
let tech=lsJSON('ha_tech_info', null);

async function api(action,{method='GET',params={},body=null}={}){
  const url=new URL(API,location.origin); url.searchParams.set('action',action);
  for(const[k,v]of Object.entries(params)) if(v!=null&&v!=='') url.searchParams.set(k,v);
  const res=await fetch(url,{method,headers:{'Content-Type':'application/json',...(token&&{Authorization:`Bearer ${token}`})},body:body?JSON.stringify(body):undefined});
  const data=await res.json().catch(()=>({}));
  // A 401 on an AUTHENTICATED call means the saved token is no longer valid — log
  // out and prompt re-login. But a 401 from login is just bad credentials, so let
  // the real error ("Incorrect phone or PIN") surface instead of the misleading
  // "Session expired".
  if(res.status===401 && action!=='login'){ logout(); throw new Error('Session expired'); }
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Status pill. A completed job shows a green check mark (.b-completed is green).
function statusBadge(status){
  const s=status||'';
  return `<span class="badge b-${s}">${s==='completed'?'Completed ✓':s.replace(/_/g,' ')}</span>`;
}
// A slot's label plus a green "+$N bonus" badge when the slot carries a pay
// bonus (e.g. the late 8 PM slot). Driven by slot.bonus from availability.js so
// there's one source of truth.
function slotLabelHtml(s){
  const base=esc(s.label);
  return s&&s.bonus ? `${base}<span class="slotbonus">+$${esc(s.bonus)} bonus</span>` : base;
}
// Strip the category prefix ("TV Size: ", "Bracket: ", "Fireplace: ", "Wall Surface: ", …)
// so payment line items read as the bare option (e.g. "33-59 inch"). The long
// Guaranteed Dismount label collapses to "GDS".
function liName(name){
  const s=String(name||'');
  if(/guaranteed\s+dismount/i.test(s)) return 'GDS';
  const i=s.indexOf(':');
  let out=(i>-1?s.slice(i+1):s).trim()||s;
  // Drop a trailing "×3" baked into the label — the count shows as a separate
  // badge, so keeping it here would read "×3 ×3". Only the × sign (never a plain
  // letter "x", e.g. "4 x 6" dimensions) is treated as a quantity marker.
  out=out.replace(/\s*[×✕✖]\s*\d+\s*$/,'').trim()||out;
  return liRelabel(out);
}
// Friendly display labels for verbose widget answers. Both the old and new
// wordings are payroll-safe ("Customer supplied bracket" = $0; "…help lift" is a
// one-person signal), so persisting the tidy label on save is harmless.
function liRelabel(t){
  const n=String(t).toLowerCase();
  // A bare TV size ('75"') -> the size bracket range (70"-84").
  const bare=n.match(/^\s*(\d{2,3})\s*(?:"|inch(?:es)?|in|”|″)?\s*$/);
  if(bare){ const v=parseInt(bare[1],10);
    if(v<=32) return '32" & under';
    if(v<=59) return '33"-59"';
    if(v<=69) return '60"-69"';
    if(v<=84) return '70"-84"';
    if(v<=97) return '85"-97"';
    return '98"+'; }
  // Frame/Gallery in-box bracket -> short brand label.
  if(/samsung\s*frame/.test(n)) return 'Samsung Frame TV';
  if(/lg\s*gallery/.test(n)) return 'LG Gallery TV';
  if(/(bracket[^]*in[^]*the?\s*box|in[^]*the?\s*box[^]*bracket|frame\s*\/?\s*gallery)/.test(n)) return 'Frame TV';
  // Wire concealment (customer wording -> internal label).
  if(/hide\s+(?:the\s+)?wires\s+outside\s+the\s+wall/.test(n)) return 'Outside Wire Concealment';
  if(/hide\s+(?:the\s+)?wires\s+behind\s+the\s+wall/.test(n)) return 'In-Wall Wire Concealment';
  if(/\bmy own\b[^]*bracket|own mounting bracket|customer supplied bracket/.test(n)) return 'Customer supplied bracket';
  if(/\bhelp\s+lift\b/.test(n) && !/\bcannot\b|can'?t/.test(n)) return 'Customer will help lift';
  return t;
}
// How many of this line item to show (e.g. 2 tilting brackets). Prefer the stored
// quantity; if that's 1 but the price is a clean multiple of the unit price (some
// booking paths fold the count into the total), infer the count from total ÷ unit.
function liDisplayQty(li){
  const q=Math.round(Number(li&&li.quantity)||0);
  if(q>1) return q;
  const u=Number(li&&li.unit_price)||0, t=Number(li&&li.line_total)||0;
  if(u>0){ const r=t/u; if(Math.abs(r-Math.round(r))<0.02 && Math.round(r)>1) return Math.round(r); }
  return 1;
}
// Street View of the job. Prefer exact lat/lng; otherwise let Google geocode the
// address string (manual bookings have no coordinates). Needs the Maps Static
// API key, which the server sends as j.maps_key. Falls back to a directions link
// or a plain message when neither a key nor a location is available.
function streetViewHtml(j){
  const loc = (j.lat&&j.lng) ? `${j.lat},${j.lng}` : (j.address||'');
  if(j.maps_key && loc){
    const src=`https://maps.googleapis.com/maps/api/streetview?size=600x450&location=${encodeURIComponent(loc)}&fov=90&pitch=0&key=${encodeURIComponent(j.maps_key)}`;
    return `<img class="streetview" src="${src}" alt="Street View of job location" onerror="this.style.display='none'">`;
  }
  return `<div class="sub" style="color:var(--mute);font-size:13px;padding:12px 0;">${ic('location')} Street View unavailable</div>`;
}

// All day math runs in the BUSINESS timezone so the tech app's calendar lines
// up with the dashboard and the booking times — never the device's timezone.
let bizTz = (tech && tech.tz) || 'America/Denver';
function todayStr(){ return new Intl.DateTimeFormat('en-CA',{timeZone:bizTz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date()); }
let scheduleDate=todayStr();           // selected day (YYYY-MM-DD, business tz)
let weekJobs=[];                       // all jobs in the visible week

// Calendar-date math on 'YYYY-MM-DD' strings via a noon-UTC anchor. A calendar
// date's weekday/number are timezone-independent, so this never drifts.
function dateAnchor(ds){ return new Date(ds+'T12:00:00Z'); }
function dowOf(ds){ return dateAnchor(ds).getUTCDay(); }            // 0..6 Sun..Sat
function addDaysStr(ds,n){ const d=dateAnchor(ds); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().split('T')[0]; }
function weekStartStr(ds){ return addDaysStr(ds, -dowOf(ds)); }     // Sunday of ds's week
function dayNum(ds){ return Number(ds.split('-')[2]); }
function fmtDs(ds,opts){ return new Intl.DateTimeFormat('en-US',{timeZone:'UTC',...opts}).format(dateAnchor(ds)); }
// Business-tz calendar date for a job (server sends local_date; fall back if not).
function jobLocalDate(j){ return j.local_date || new Intl.DateTimeFormat('en-CA',{timeZone:bizTz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(j.scheduled_at)); }

async function showJobs(date){
  if(date) scheduleDate=date;
  show('jobsView');
  applyIconTheme();
  document.getElementById('techName').textContent=tech?tech.name:'';
  renderTechNotice();
  await loadWeek();
}

// Targeted dashboard notice. Currently: Joey-off coverage note, shown to TK and
// Gregory only, all day Sunday (Denver time). Stays until removed by request.
function isSundayDenver(){
  try{ return new Intl.DateTimeFormat('en-US',{timeZone:'America/Denver',weekday:'short'}).format(new Date())==='Sun'; }
  catch{ return new Date().getDay()===0; }
}
function renderTechNotice(){
  const el=document.getElementById('techNotice'); if(!el) return;
  const name=String(tech&&tech.name||'');
  const forTech=/\b(tk|gregory)\b/i.test(name);

    el.classList.remove('hidden');
  }else{
    el.innerHTML=''; el.classList.add('hidden');
  }
}

async function loadWeek(){
  const start=weekStartStr(scheduleDate);
  const days=[...Array(7)].map((_,i)=>addDaysStr(start,i));
  const end=days[6];
  // Week title (e.g. "June 14–20" or spanning months).
  const sameMonth=days[0].slice(0,7)===end.slice(0,7);
  document.getElementById('weekTitle').textContent = sameMonth
    ? `${fmtDs(days[0],{month:'long'})} ${dayNum(days[0])}–${dayNum(end)}`
    : `${fmtDs(days[0],{month:'short',day:'numeric'})} – ${fmtDs(end,{month:'short',day:'numeric'})}`;

  const grid=document.getElementById('weekGrid');
  const list=document.getElementById('jobsList');
  const today=todayStr();
  grid.innerHTML=days.map(ds=>`
    <div class="daycell${ds===scheduleDate?' sel':''}${ds===today?' today':''}" data-date="${ds}">
      <span class="dc-dow">${fmtDs(ds,{weekday:'short'}).slice(0,2)}</span>
      <span class="dc-num">${dayNum(ds)}</span>
      <span class="dc-count empty" data-count="${ds}">0</span>
    </div>`).join('');
  grid.querySelectorAll('.daycell').forEach(c=>c.addEventListener('click',()=>{ scheduleDate=c.dataset.date; renderDay(); markSelected(); }));

  list.innerHTML='<div class="empty">Loading…</div>';
  try{
    const d=await api('jobs',{params:{from:days[0],to:end}});
    weekJobs=d.jobs||[];
    if(d.tz) bizTz=d.tz;   // keep device in sync with the business timezone
    // Per-day counts on the calendar (grouped by business-tz date).
    const counts={};
    weekJobs.forEach(j=>{ const ds=jobLocalDate(j); counts[ds]=(counts[ds]||0)+1; });
    grid.querySelectorAll('[data-count]').forEach(el=>{
      const n=counts[el.dataset.count]||0; el.textContent=n;
      el.classList.toggle('empty',n===0);
    });
    renderDay();
  }catch(e){ list.innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}

function markSelected(){
  document.querySelectorAll('#weekGrid .daycell').forEach(c=>c.classList.toggle('sel',c.dataset.date===scheduleDate));
}

// Critical alert: any of the tech's active jobs with no address on file. Shown at
// the very top of the jobs view; clears automatically when the job is completed
// (or the office fixes the address). Scans the whole loaded week, not just the
// selected day, so it's visible no matter which day is open.
function renderCritAlerts(){
  const box=document.getElementById('critAlert'); if(!box) return;
  const bad=(weekJobs||[]).filter(j=>j.address_missing && j.status!=='completed' && j.status!=='cancelled');
  box.innerHTML=bad.map(j=>`<div class="crit-alert">
    <div class="ca-h">⚠ Attention — action needed</div>
    <div class="ca-b">${esc(j.customer_name||'Customer')} for ${esc(j.slot_time||fmtTime(j.scheduled_at))} has no address on file. Call the customer immediately to get the address.</div>
    ${j.customer_phone?`<a class="ca-call" href="tel:${esc(j.customer_phone)}">📞 Call ${esc(j.customer_phone)}</a>`:''}
  </div>`).join('');
}
function renderDay(){
  renderCritAlerts();
  const isToday=scheduleDate===todayStr();
  const dLabel=fmtDs(scheduleDate,{weekday:'short',month:'short',day:'numeric'});
  const jobs=weekJobs.filter(j=>jobLocalDate(j)===scheduleDate);
  document.getElementById('jobsSub').textContent=`${jobs.length} job${jobs.length===1?'':'s'} — ${isToday?'Today':dLabel}`;
  const list=document.getElementById('jobsList');
  list.innerHTML = jobs.length ? jobs.map(j=>`
    <div class="jobc${j.cross_company?' xco':''}" data-id="${j.id}">
      ${j.cross_company?`<div class="xco-tag">⚠ FOR ${esc((j.company_name||'OTHER COMPANY').toUpperCase())}</div>`:''}
      <div class="t">${esc(j.slot_time||fmtTime(j.scheduled_at))}</div>
      <div class="n">${esc(j.customer_name)}</div>
      <div class="m">${esc(j.service||'')}<br>${esc(j.address||'')}</div>
      ${statusBadge(j.status)}
    </div>`).join('') : `<div class="empty">No jobs scheduled ${isToday?'today':'on '+dLabel}.<br>Enjoy your day! 🎉</div>`;
  list.querySelectorAll('.jobc').forEach(c=>c.addEventListener('click',()=>showDetail(c.dataset.id)));
}

          try{ await api('status',{method:'POST',body:{id,status:next.to,eta_minutes:eta}}); toast(next.label+' ✓'); showDetail(id); }
          catch(e){ toast(e.message); }
          document.querySelectorAll('#etaModal [data-eta]').forEach(b=>b.removeEventListener('click',etaHandler));
        };
        document.querySelectorAll('#etaModal [data-eta]').forEach(btn=>{
          btn.addEventListener('click',()=>etaHandler(parseInt(btn.dataset.eta)));
        });
      } else {
        try{ await api('status',{method:'POST',body:{id,status:next.to}}); toast(next.label+' ✓'); showDetail(id); }
        catch(e){ toast(e.message); adv.disabled=false; }
      }
    });

    // Photo handlers
    document.getElementById('addPhoto').addEventListener('click',()=>document.getElementById('photoInput').click());
    document.getElementById('photoInput').addEventListener('change',e=>uploadPhotos(id, e.target.files));
    bindPhotoGrid(id);

    // Note handlers
    document.getElementById('addNote').addEventListener('click',()=>addNote(id));
    bindNoteList(id);

    // Payment handlers
    const jc=document.getElementById('jobCharge'); if(jc) jc.onclick=()=>openChargeFlow(j);
    const jm=document.getElementById('jobMarkPaid'); if(jm) jm.onclick=async()=>{ if(confirm('Mark this job as paid (cash)?')){ await paymentAction(j.id,'mark_paid'); } };
    // Refunds are office-only — techs have no refund control (removed by owner request).

    // Change / add card on file (customer wants to pay with a different card).
    const jcc=document.getElementById('jobChangeCard');
    if(jcc) jcc.onclick=()=>{ const box=document.getElementById('cardBox'); if(box){ box.classList.remove('hidden'); jcc.style.display='none'; mountTechCard(j); } };
    const ccx=document.getElementById('cardCancel');
    if(ccx) ccx.onclick=()=>{ const box=document.getElementById('cardBox'); if(box) box.classList.add('hidden'); if(jcc) jcc.style.display=''; };

    // Line-item editor (text + price). Techs only edit the visible work lines;
    // fees/tips are preserved server-side and the total is recomputed there.
    mountTechLineItems(j, id);

    // Bracket supplier: record which tech supplied the bracket (required to complete).
    const bch=document.getElementById('bracketChange'); if(bch) bch.onclick=()=>{ const p=document.getElementById('bracketPick'); if(p) p.classList.remove('hidden'); };
    const bsave=document.getElementById('bracketSave'); if(bsave) bsave.onclick=async()=>{
      const tid=document.getElementById('bracketTech').value;
      if(!tid){ toast('Select which technician supplied the bracket'); return; }
      bsave.disabled=true;
      try{ await api('job_bracket_supplier',{method:'POST',body:{id,technician_id:tid}}); toast('Bracket supplier saved ✓'); showDetail(id); }
      catch(e){ toast(e.message); bsave.disabled=false; }
    };

    // Extra time slots ("block my next slot" — big jobs that run long).
    bindSlots(id, j);

    // Multi-tech sync: while this job is open, unpaid, and not yet complete, poll
    // so that if the OTHER tech on the job takes the payment, this screen switches
    // to "paid" and unblocks Mark Complete on its own — no manual refresh needed.
    if(detailPoll){ clearInterval(detailPoll); detailPoll=null; }
    if(j.status!=='completed' && !paidOK){
      detailPoll=setInterval(async()=>{
        try{
          const {job:fresh}=await api('job',{params:{id}});
          if(fresh && (fresh.payment_status!==j.payment_status || fresh.status!==j.status)){
            clearInterval(detailPoll); detailPoll=null; showDetail(id);
          }
        }catch(_){}
      }, 12000);
    }
  }catch(e){ v.innerHTML=`<div class="detail"><button class="back" id="back">‹ Back</button><div class="empty">${esc(e.message)}</div></div>`;
    document.getElementById('back').addEventListener('click',showJobs); }
}

// ── Extra time slots (big-job "block my next slot") ──────────────────────────
// A job normally holds ONE 2-hour slot. A big job can run into the next slot(s),
// so the tech reserves them here — one tap adds the next slot, ✕ releases it.
// The office schedule + availability treat reserved slots as busy, so no new
// customer gets booked on top of a job that runs long. Hidden when the job has
// no time yet, is finished, or the DB predates migration 0052.
function slotsCardHtml(j){
  const s=j.slots;
  if(!s || !s.available || !s.main_slot) return '';
  if(j.status==='completed'||j.status==='cancelled') return '';
  const held=1+(s.extra?s.extra.length:0);
  const extraChips=(s.extra||[]).map(x=>
    `<span class="slotpill"><span>${esc(x.label)}</span><button class="slotpill-x" data-rm="${esc(x.slot_key)}" title="Release this slot">×</button></span>`
  ).join('');
  const next=(s.addable&&s.addable.length)?s.addable[0]:null;
  return `<div class="card" id="slotsCard">
    <h3>⧉ Reserve Extra Time</h3>
    <div class="sub" style="color:var(--mute);font-size:13px;line-height:1.5;margin-bottom:10px;">
      Running long? Block the next slot so no new job lands on top of you.
    </div>
    <div class="slotheld">This job holds <strong>${held}</strong> time slot${held===1?'':'s'}:</div>
    <div class="slotrow">
      <span class="slotpill main"><span>${esc(s.main_label||'Start')}</span></span>
      ${extraChips}
    </div>
    ${next
      ? `<button class="btn ghost" id="slotAdd" data-next="${esc(next.slot_key)}" style="margin-top:12px;">⛔ Block my next slot <span style="opacity:.7;font-weight:600;">(${esc(next.label)})</span></button>`
      : (s.extra&&s.extra.length
          ? `<div class="sub" style="color:var(--mute);font-size:13px;margin-top:12px;">No more slots left in the day to block.</div>`
          : `<div class="sub" style="color:var(--mute);font-size:13px;margin-top:12px;">No later slots available to block today.</div>`)}
  </div>`;
}
function bindSlots(id, j){
  const s=j.slots; if(!s || !s.available) return;
  const curKeys=(s.extra||[]).map(x=>x.slot_key);
  async function save(nextKeys, btn){
    if(btn) btn.disabled=true;
    try{ await api('job_slots',{method:'POST',body:{id,slots:nextKeys}}); showDetail(id); }
    catch(e){ toast(e.message); if(btn) btn.disabled=false; }
  }
  const add=document.getElementById('slotAdd');
  if(add) add.onclick=()=>save([...curKeys, add.dataset.next], add);
  document.querySelectorAll('#slotsCard [data-rm]').forEach(b=>{
    b.onclick=()=>save(curKeys.filter(k=>k!==b.dataset.rm), b);
  });
}

// ── Change / add the card on file ────────────────────────────────────────────
// Tokenizes a new card with the job's account publishable key (j.stripe_pk) and
// saves it via job_card_update, so the next charge uses the new card.
let _techStripe=null,_techCard=null;
function mountTechCard(j){
  const errEl=document.getElementById('cardErr');
  if(!window.Stripe){ if(errEl) errEl.textContent='Payment library not loaded. Refresh and try again.'; return; }
  if(!j.stripe_pk){ if(errEl) errEl.textContent="Card entry isn't available for this company yet — please take cash and tap “Mark paid (cash)”."; return; }
  try{ _techStripe=window.Stripe(j.stripe_pk); }catch(e){ if(errEl) errEl.textContent='Could not start card entry.'; return; }
  if(_techCard){ try{ _techCard.unmount(); }catch(e){} }
  _techCard=_techStripe.elements().create('card',{style:{base:{color:'#fff',fontSize:'16px','::placeholder':{color:'#8a8a99'}}}});
  _techCard.mount('#cardEl');
  const save=document.getElementById('cardSave');
  if(save) save.onclick=async()=>{
    if(errEl) errEl.textContent='';
    save.disabled=true; save.textContent='Saving…';
    const {paymentMethod,error}=await _techStripe.createPaymentMethod({type:'card',card:_techCard});
    if(error){ if(errEl) errEl.textContent=error.message; save.disabled=false; save.textContent='Save card'; return; }
    try{ await api('job_card_update',{method:'POST',body:{id:j.id,payment_method_id:paymentMethod.id}}); toast('Card updated ✓'); showDetail(j.id); }
    catch(e){ if(errEl) errEl.textContent=e.message; save.disabled=false; save.textContent='Save card'; }
  };
}

// ── Line-item editor ─────────────────────────────────────────────────────────
// Every line is { text, price }. Techs see only the work lines (fees/tips are
// hidden), so the total shown adds back hidden_total to match the booking price.
// A job with no work lines (e.g. imported) seeds one line from price − hidden.
function fmtUsd(n){ return '$'+(Math.round((Number(n)||0)*100)/100); }
function mountTechLineItems(j, id){
  const wrap=document.getElementById('liEditor');
  const totalEl=document.getElementById('liTotal'); // optional — the Total line was removed
  if(!wrap) return;
  const hiddenTotal=Number(j.hidden_total)||0;
  // Existing lines (already on the booking) show TEXT + remove only — techs don't
  // see the customer pricing on them. A line the tech ADDS gets a price field so
  // they can charge for on-site extras. `existing` marks which is which.
  // Coupons and tax never belong in the editable list — they show in the Payment
  // section (server already filters them out; this is a belt-and-suspenders guard).
  const notHidden=li=>{ const raw=String(li&&li.name||''); if(/^\s*tv\s*type\s*:\s*regular\b/i.test(raw)) return false; if(/\btv removal\b/i.test(raw)) return false; const n=String(liName(li.name)||'').trim(); return !/^coupon\b/i.test(n) && !/^tax\b/i.test(n) && !/service area surcharge|after[\s-]?hours|travel fee|service\s*minimum/i.test(n) && !/guarante\w*\s+dismount|dismount\s+service/i.test(n); };
  // Row model: { name, unit (per-item price), qty, existing }. line total = unit×qty.
  const mkRow=li=>{ const lt=Number(li.line_total!=null?li.line_total:li.unit_price)||0; const q=liDisplayQty(li); return { name:liName(li.name)||'', unit:(q>0?lt/q:lt), qty:q, existing:true }; };
  const seeded=(j.line_items&&j.line_items.length) ? j.line_items.filter(notHidden).map(mkRow) : [];
  let rows=seeded.length ? seeded
    : [{ name:j.service||'Service', unit:Math.max(0,(Number(j.price)||0)-hiddenTotal), qty:1, existing:true }];
  const recalc=()=>{ if(!totalEl) return; const t=rows.reduce((s,r)=>s+(Number(r.unit)||0)*(Math.max(1,Math.round(Number(r.qty)||1))),0)+hiddenTotal; totalEl.textContent=fmtUsd(t); };
  const render=()=>{
    wrap.innerHTML=rows.map((r,i)=>{
      const q=Math.max(1,Math.round(Number(r.qty)||1));
      const priceCell = r.existing ? '' :
        `<div style="display:flex;align-items:center;gap:2px;flex:0 0 auto;"><span style="color:var(--mute);">$</span><input type="number" step="0.01" inputmode="decimal" data-i="${i}" data-f="unit" value="${r.unit}" style="width:70px;background:var(--navy);border:1px solid var(--line);color:var(--ink);padding:10px;border-radius:8px;font-size:15px;text-align:right;"></div>`;
      const stepper = `<div style="display:flex;align-items:center;flex:0 0 auto;border:1px solid var(--line);border-radius:8px;overflow:hidden;">
        <button type="button" data-qd="${i}" aria-label="Decrease quantity" style="width:34px;height:42px;background:var(--navy);color:var(--ink);border:none;font-size:22px;line-height:1;cursor:pointer;">−</button>
        <span style="min-width:24px;text-align:center;font-weight:800;font-size:15px;color:var(--ink);">${q}</span>
        <button type="button" data-qi="${i}" aria-label="Increase quantity" style="width:34px;height:42px;background:var(--navy);color:var(--ink);border:none;font-size:20px;line-height:1;cursor:pointer;">+</button>
      </div>`;
      return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
      <input type="text" data-i="${i}" data-f="name" value="${esc(r.name)}" placeholder="Description" style="flex:1 1 auto;min-width:0;background:var(--navy);border:1px solid var(--line);color:var(--ink);padding:10px;border-radius:8px;font-size:15px;">
      ${stepper}
      ${priceCell}
      <button type="button" class="btn ghost" data-del="${i}" title="Remove" aria-label="Remove line item" style="flex:0 0 auto;width:42px;height:42px;padding:0;border-radius:8px;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;">×</button>
    </div>`;
    }).join('')||'<div class="sub" style="font-size:13px;color:var(--mute);">No line items. Add one below.</div>';
    wrap.querySelectorAll('input[data-f]').forEach(inp=>inp.addEventListener('input',()=>{ rows[+inp.dataset.i][inp.dataset.f]=inp.value; recalc(); }));
    wrap.querySelectorAll('button[data-del]').forEach(btn=>btn.addEventListener('click',()=>{ rows.splice(+btn.dataset.del,1); render(); }));
    wrap.querySelectorAll('button[data-qd]').forEach(b=>b.addEventListener('click',()=>{ const i=+b.dataset.qd; rows[i].qty=Math.max(1,(Math.round(Number(rows[i].qty)||1))-1); render(); }));
    wrap.querySelectorAll('button[data-qi]').forEach(b=>b.addEventListener('click',()=>{ const i=+b.dataset.qi; rows[i].qty=Math.min(99,(Math.round(Number(rows[i].qty)||1))+1); render(); }));
    recalc();
  };
  render();
  const add=document.getElementById('liAdd'); if(add) add.onclick=()=>{ rows.push({ name:'', unit:0, qty:1, existing:false }); render(); };
  const save=document.getElementById('liSave'); if(save) save.onclick=async()=>{
    const items=rows.map(r=>({ name:(r.name||'').trim(), quantity:Math.max(1,Math.round(Number(r.qty)||1)), unit_price:Number(r.unit)||0 })).filter(r=>r.name||r.unit_price);
    save.disabled=true;
    try{ await api('job_line_items_save',{method:'POST',body:{id,items}}); toast('Line items saved'); showDetail(id); }
    catch(e){ toast(e.message); save.disabled=false; }
  };
}

// Resize/compress on-device so uploads stay small & fast.
function compressImage(file,maxDim=1600,quality=0.8){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width,h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality)); };
      img.onerror=()=>reject(new Error('Could not read that image.')); img.src=reader.result; };
    reader.onerror=()=>reject(new Error('Could not read that file.')); reader.readAsDataURL(file);
  });
}
async function uploadPhotos(id, files){
  const list=[...(files||[])].filter(f=>f.type.startsWith('image/'));
  if(!list.length) return;
  toast(`Uploading ${list.length} photo${list.length===1?'':'s'}…`);
  let ok=0;
  for(const f of list){
    try{ const dataUrl=await compressImage(f); await api('job_photo_add',{method:'POST',body:{id,image:dataUrl}}); ok++; }
    catch(e){ toast(e.message); }
  }
  if(ok) toast(`${ok} photo${ok===1?'':'s'} added ✓`);
  showDetail(id);
}

function relTime(iso){
  try{ const d=new Date(iso), s=(Date.now()-d.getTime())/1000;
    if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago';
    if(s<86400) return Math.floor(s/3600)+'h ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
  catch{ return ''; }
}

// ── Charge flow: review → tip → sign (captures chargeback evidence) ──────────
// A full-screen, customer-facing sequence the tech hands over at the job. The

const TERMS_VERSION='2026-07-01';
// Refund & cancellation policy shown on the signature screen and frozen into the
// signed terms as chargeback evidence. Edit the numbers here (cancellation
// window, trip fee, guarantee period, refund window) to change the policy.
const REFUND_POLICY=[
  '1. Cancellations & rescheduling: You may cancel or reschedule at no charge up to 24 hours before your appointment. Cancellations inside 24 hours, or if our technician cannot access the property at the scheduled time, may incur a trip fee of up to $50.',

  '5. Not covered: We are not responsible for pre-existing wall damage, concealed wiring or piping, or the structural integrity of walls. Customer-supplied equipment is installed at the customer’s risk.',
  '6. Disputes: Please raise any concern with us directly before contacting your bank. Charges for services rendered and accepted are supported by your signed authorization.',
].join('\n\n');
function fmtMoney(n){ return '$'+(Math.round((Number(n)||0)*100)/100).toFixed(2); }
function openChargeFlow(j){
  const base=Number(j.price)||0;
  if(base<=0){ toast('This job has no price to charge.'); return; }
  let tip=0, step=1, sigData=null, signerName=(j.customer&&j.customer.name)||'', customMode=false, charging=false;
  const custName=(j.customer&&j.customer.name)||'';
  const bizName=j.company_name||(j.business&&j.business.name)||'the company';
  const lines=(j.line_items||[]).filter(li=>Number(li.line_total)>0);
  const total=()=>Math.round((base+tip)*100)/100;
  // Shown at signing — the tip is chosen AFTER, so the customer authorizes the
  // service amount "plus any gratuity I add".
  const authLine=(name)=>`I, ${name||custName||'the customer'}, authorize ${bizName} to charge my card on file for the services above (${fmtMoney(base)} service) plus any gratuity I add on the next screen. I confirm the work was completed to my satisfaction, and I have read and agree to the Terms of Service and Refund Policy.`;
  // Stored at charge time — records the actual final total including the tip.
  const termsFor=(name)=>`I, ${name||custName||'the customer'}, authorize ${bizName} to charge my card on file ${fmtMoney(total())} for the services above (${fmtMoney(base)} service${tip>0?` + ${fmtMoney(tip)} tip`:''}). I confirm the work was completed to my satisfaction, and I have read and agree to the Terms of Service and Refund Policy.`;

  // Charge-flow styles, injected once: force-landscape for the signature + tip
  // steps (wide signing strip / big tip buttons) and the POS-style tip grid.
  if(!document.getElementById('cfStyle')){
    const st=document.createElement('style'); st.id='cfStyle';
    st.textContent=`
      .cf-ov{position:fixed;inset:0;z-index:9999;background:var(--navy);color:var(--ink);display:flex;flex-direction:column;}
      .cf-tipcol{display:flex;flex-direction:column;gap:11px;max-width:560px;margin:0 auto;width:100%;}
      .cf-tiprow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
      .cf-preset{background:var(--orange);color:#fff;border:none;border-radius:12px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:inherit;cursor:pointer;}
      .cf-preset:active{filter:brightness(1.12);}
      .cf-preset .amt{font-size:28px;font-weight:800;line-height:1;}
      .cf-preset .sub{font-size:12px;color:rgba(255,255,255,.82);font-weight:600;}
      .cf-bar{background:var(--orange);color:#fff;border:none;border-radius:12px;min-height:50px;font-size:16px;font-weight:700;width:100%;font-family:inherit;cursor:pointer;}
      .cf-bar:active{filter:brightness(1.12);}
      .cf-backx{position:absolute;top:12px;left:12px;background:transparent;border:none;color:var(--mute);font-size:24px;font-weight:800;padding:6px 12px;cursor:pointer;z-index:2;}
    `;
    document.head.appendChild(st);
  }

  const ov=document.createElement('div');
  ov.className='cf-ov';
  document.body.appendChild(ov);
  document.body.style.overflow='hidden';

  const done=()=>{
    document.body.style.overflow='';
    ov.remove();
  };

  const ticketRows=()=> lines.map(li=>{const q=liDisplayQty(li);return `<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>${esc(liName(li.name))}${q>1?` ×${q}`:''}</span><span>${fmtMoney(li.line_total)}</span></div>`;}).join('');

  function render(){
    if(step===1){
      ov.innerHTML=`
      <div style="padding:22px;overflow:auto;flex:1;">
        <h2 style="margin:0 0 4px;font-size:22px;">Review ticket</h2>
        <div style="color:var(--mute);margin-bottom:16px;font-size:14px;">${esc(custName||'Customer')}</div>
        <div style="background:var(--navy-2);border:1px solid var(--line);border-radius:12px;padding:16px;font-size:15px;">
          ${ticketRows()||'<div style="color:var(--mute);">Service</div>'}
          <div style="display:flex;justify-content:space-between;padding-top:12px;margin-top:8px;border-top:1px solid var(--line);font-weight:800;font-size:18px;"><span>Total (incl. tax)</span><span>${fmtMoney(base)}</span></div>
        </div>
      </div>
      <div style="padding:16px;display:flex;gap:10px;border-top:1px solid var(--line);">
        <button class="btn ghost" data-x style="flex:1;">Cancel</button>
        <button class="btn" data-next style="flex:2;">Continue to signature →</button>
      </div>`;
    } else if(step===2){
      // Signing screen: fixed, NON-scrolling flex column so nothing scrolls under
      // the finger. Name field is pinned above the canvas (always visible), and the
      // canvas fills the remaining height — so touching it only ever draws, never
      // fights a scroll region. Full legal text lives behind "View Terms" (still
      // captured server-side at charge time regardless of what's shown here).
      ov.innerHTML=`
      <div style="padding:16px 20px 0;flex:none;">
        <h2 style="margin:0 0 2px;font-size:21px;">Authorize payment</h2>
        <div style="font-size:23px;font-weight:800;margin-bottom:10px;">${fmtMoney(base)} <span style="font-size:13px;color:var(--mute);font-weight:600;">+ tip next</span></div>
        <div style="background:var(--navy-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:12px;color:var(--mute);line-height:1.5;">${esc(authLine(signerName))}</div>
        <button id="cfTermsOpen" type="button" class="btn ghost" style="width:100%;margin-top:8px;padding:9px;font-size:13px;">View Terms &amp; Refund Policy</button>
        <input id="cfName" type="text" placeholder="Type full name" value="${esc(signerName)}" style="margin-top:10px;">
        <div style="color:var(--mute);font-size:13px;margin:10px 2px 6px;">Sign below to authorize</div>
      </div>
      <div style="flex:1;min-height:130px;position:relative;padding:0 20px 8px;">
        <canvas id="cfSig" style="width:100%;height:100%;background:#fff;border-radius:10px;touch-action:none;display:block;"></canvas>
        <button id="cfClear" class="btn ghost" style="position:absolute;top:8px;right:28px;padding:6px 12px;font-size:13px;">Clear</button>
      </div>
      <div style="padding:14px 20px;display:flex;gap:10px;border-top:1px solid var(--line);flex:none;">
        <button class="btn ghost" data-back style="flex:1;">← Back</button>
        <button class="btn" id="cfSignNext" style="flex:2;opacity:.5;" disabled>Continue to tip →</button>
      </div>
      <div id="cfTerms" style="position:absolute;inset:0;background:var(--navy);display:none;flex-direction:column;z-index:5;">
        <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);flex:none;">
          <h2 style="margin:0;font-size:18px;">Terms &amp; Refund Policy</h2>
          <button id="cfTermsClose" type="button" class="btn" style="padding:7px 16px;">Done</button>
        </div>
        <div style="flex:1;overflow:auto;padding:18px 20px;">
          <div style="font-size:13px;color:var(--mute);line-height:1.55;margin-bottom:16px;">${esc(authLine(signerName))}</div>
          <div style="color:var(--mute);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:0 0 6px;">Refund &amp; Cancellation Policy</div>
          <div style="font-size:13px;color:var(--ink);line-height:1.6;white-space:pre-wrap;">${esc(REFUND_POLICY)}</div>
        </div>
      </div>`;
    } else if(customMode){
      // Custom-tip entry: type an amount, then confirm the charge.
      ov.innerHTML=`
      <div style="padding:22px;overflow:auto;flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;position:relative;">
        <button class="cf-backx" data-tipgrid>←</button>
        <h2 style="margin:0 0 4px;font-size:22px;">Custom tip</h2>
        <div style="color:var(--mute);font-size:13px;margin-bottom:16px;">100% goes to your technician</div>
        <input id="cfCustom" type="number" inputmode="decimal" min="0" placeholder="Enter tip amount" value="${(tip>0)?tip:''}" style="width:100%;max-width:320px;margin:0 auto;text-align:center;color:#fff;font-size:26px;">
      </div>
      <div style="padding:16px;display:flex;gap:10px;border-top:1px solid var(--line);">
        <button class="btn ghost" data-tipgrid style="flex:1;">← Back</button>
        <button class="btn" id="cfCharge" style="flex:2;white-space:nowrap;">Charge ${fmtMoney(total())}</button>
      </div>`;
    } else {
      // Tip — POS layout: three preset squares, then Custom, then No tip. Tapping
      // any option finalizes the charge (the customer already reviewed + signed).
      ov.innerHTML=`
      <div style="padding:20px;overflow:auto;flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;">
        <button class="cf-backx" data-back>←</button>
        <div style="text-align:center;margin-bottom:16px;">
          <h2 style="margin:0 0 4px;font-size:23px;">Add a tip?</h2>
          <div style="color:var(--mute);font-size:13px;">100% goes to your technician</div>
        </div>
        <div class="cf-tipcol">
          <div class="cf-tiprow">
            ${[20,30,50].map(p=>`<button class="cf-preset" data-tip="${p}"><span class="amt">$${p}</span><span class="sub">Total ${fmtMoney(base+p)}</span></button>`).join('')}
          </div>
          <button class="cf-bar" data-custom>Custom</button>
          <button class="cf-bar" data-notip>No tip</button>
        </div>
      </div>`;
    }
    wire();
  }

  function wire(){
    const x=ov.querySelector('[data-x]'); if(x) x.onclick=done;
    // Back: step 2 → step 1, or the tip grid's ← → step 2. Always leaves custom mode.
    ov.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>{ step--; customMode=false; render(); });
    const next=ov.querySelector('[data-next]'); if(next) next.onclick=()=>{ step++; render(); };
    // Preset tip squares — tapping charges immediately (POS-style).
    ov.querySelectorAll('[data-tip]').forEach(b=>b.onclick=()=>{ tip=Number(b.dataset.tip)||0; submit(); });
    const notip=ov.querySelector('[data-notip]'); if(notip) notip.onclick=()=>{ tip=0; submit(); };
    const openCustom=ov.querySelector('[data-custom]'); if(openCustom) openCustom.onclick=()=>{ customMode=true; render(); };
    ov.querySelectorAll('[data-tipgrid]').forEach(b=>b.onclick=()=>{ customMode=false; render(); });
    const cust=ov.querySelector('#cfCustom');
    if(cust) cust.oninput=()=>{ tip=Math.max(0,Number(cust.value)||0); const cb=ov.querySelector('#cfCharge'); if(cb) cb.textContent='Charge '+fmtMoney(total()); };
    const charge=ov.querySelector('#cfCharge'); if(charge) charge.onclick=()=>submit();
    if(step===2) setupSign();
  }

  async function submit(){
    if(charging) return; charging=true;               // guard against a double-tap double-charge
    ov.style.pointerEvents='none';
    const btn=ov.querySelector('#cfCharge'); if(btn){ btn.disabled=true; btn.textContent='Charging…'; } else toast('Charging…');
    const nm=signerName;
    try{
      await api('job_payment',{method:'POST',body:{ id:j.id, action:'charge', tip,
        signature:sigData||undefined, customer_name:nm,
        terms_text:termsFor(nm)+'\n\nRefund & Cancellation Policy:\n'+REFUND_POLICY, terms_version:TERMS_VERSION,
        snapshot:{ line_items:j.line_items||[], ticket_amount:base, tip, total:total() } }});
      done(); toast('Charged '+fmtMoney(total())+' — receipt sent ✓');
      setTimeout(()=>showDetail(j.id),400);
    }catch(e){
      charging=false; ov.style.pointerEvents='';
      chargeError(e.message||'Charge failed');
      if(btn){ btn.disabled=false; btn.textContent='Charge '+fmtMoney(total()); }
    }
  }

  // A charge failure used to flash a 2.4s toast that was easy to miss — the tech
  // just saw the button snap back and read it as "stuck". Show a persistent,
  // obvious banner with the reason, and (when there's no card to charge) a
  // one-tap "Take cash — mark paid" so the job can still close in the field.
  async function markPaidCash(){
    try{ await api('job_payment',{method:'POST',body:{ id:j.id, action:'mark_paid' }});
      done(); toast('Marked paid (cash) ✓'); setTimeout(()=>showDetail(j.id),400);
    }catch(e){ toast(e.message||'Could not mark paid'); }
  }
  function chargeError(msg){
    const host=ov.querySelector('div[style*="flex:1"]'); if(!host) { toast(msg); return; }
    let box=ov.querySelector('#cfErr');
    if(!box){ box=document.createElement('div'); box.id='cfErr'; host.insertBefore(box, host.firstChild); }
    const noCard=/no card on file|mark paid|not set up|aren't set up/i.test(msg);
    box.innerHTML=`<div style="background:#3a1414;border:1px solid #7f1d1d;color:#fecaca;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.5;margin-bottom:14px;text-align:left;">
        <div style="font-weight:800;margin-bottom:3px;">Card was NOT charged</div>${esc(msg)}</div>`
      + (noCard?`<button id="cfCash" class="btn" style="width:100%;margin-bottom:14px;background:#16a34a;">Take cash — mark paid ✓</button>`:'');
    const cash=ov.querySelector('#cfCash'); if(cash) cash.onclick=markPaidCash;
    toast(msg);
  }

  function setupSign(){
    const cv=ov.querySelector('#cfSig'); if(!cv) return;
    const nextBtn=ov.querySelector('#cfSignNext'), clr=ov.querySelector('#cfClear'), nameEl=ov.querySelector('#cfName');
    // "View Terms" panel: slides over the signing screen so the full legal text is
    // reachable without making the signing screen itself scroll.
    const termsOpen=ov.querySelector('#cfTermsOpen'), termsPanel=ov.querySelector('#cfTerms'), termsClose=ov.querySelector('#cfTermsClose');
    if(termsOpen&&termsPanel) termsOpen.onclick=()=>{ termsPanel.style.display='flex'; };
    if(termsClose&&termsPanel) termsClose.onclick=()=>{ termsPanel.style.display='none'; };
    const ctx=cv.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    // Canvas is upright and fills its flex cell — size the backing store from the
    // laid-out box and map pointer coords straight through (no rotation math).
    const CW=cv.offsetWidth||cv.getBoundingClientRect().width, CH=cv.offsetHeight||cv.getBoundingClientRect().height;
    cv.width=Math.round(CW*dpr); cv.height=Math.round(CH*dpr);
    ctx.scale(dpr,dpr); ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#111';
    let drawing=false, inked=false, lx=0, ly=0;
    const pos=e=>{ const r=cv.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; };
    const enable=()=>{ if(nextBtn){ nextBtn.disabled=false; nextBtn.style.opacity='1'; } };
    // Returning from the tip step? Redraw the signature already captured.
    if(sigData){ const img=new Image(); img.onload=()=>{ try{ ctx.drawImage(img,0,0,cv.width/dpr,cv.height/dpr); }catch(_){} }; img.src=sigData; inked=true; enable(); }
    cv.addEventListener('pointerdown',e=>{ e.preventDefault(); drawing=true; [lx,ly]=pos(e); try{cv.setPointerCapture(e.pointerId);}catch(_){}; });
    cv.addEventListener('pointermove',e=>{ if(!drawing) return; e.preventDefault(); const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.stroke(); [lx,ly]=[x,y]; inked=true; enable(); });
    const stop=()=>{ drawing=false; };
    cv.addEventListener('pointerup',stop); cv.addEventListener('pointercancel',stop); cv.addEventListener('pointerleave',stop);
    if(clr) clr.onclick=()=>{ ctx.clearRect(0,0,cv.width,cv.height); inked=false; sigData=null; if(nextBtn){ nextBtn.disabled=true; nextBtn.style.opacity='.5'; } };
    if(nextBtn) nextBtn.onclick=()=>{ if(!inked){ toast('Please sign first.'); return; } signerName=(nameEl&&nameEl.value.trim())||custName||''; sigData=cv.toDataURL('image/png'); step=3; render(); };
  }

  render();
}

function close(){ showJobs(); }

function shiftWeek(delta){
  scheduleDate=addDaysStr(scheduleDate, delta*7); loadWeek();
}
document.getElementById('weekPrev').addEventListener('click',()=>shiftWeek(-1));
document.getElementById('weekNext').addEventListener('click',()=>shiftWeek(1));

let availDefs=null;                 // { slots, days } from the server
let availState=new Set();           // selected "day:slot_key" keys (recurring)
let availExceptions=[];             // [{date, slot_key, is_available}] one-time overrides
let exEditState=new Set();          // slot keys selected in the open date editor
document.getElementById('availBtn').addEventListener('click',showAvailability);
document.getElementById('payrollBtn').addEventListener('click',showPayroll);
document.getElementById('reviewsBtn').addEventListener('click',showReviews);
document.getElementById('inventoryBtn').addEventListener('click',showInventory);

let payrollWeekStart='';            // 'YYYY-MM-DD' for Sunday of current week

async function showAvailability(){
  show('availabilityView');
  const v=document.getElementById('availabilityView');
  v.innerHTML='<div class="avail"><div class="empty">Loading…</div></div>';
  try{
    const d=await api('availability');
    availDefs={ slots:d.slots, days:d.days };
    availState=new Set((d.availability||[]).map(a=>`${a.day_of_week}:${a.slot_key}`));
    availExceptions=d.exceptions||[];
    renderAvailability();
  }catch(e){
    v.innerHTML=`<div class="avail"><button class="back" id="availBack">‹ Today's jobs</button><div class="empty">${esc(e.message)}</div></div>`;
    document.getElementById('availBack').addEventListener('click',showJobs);
  }
}

function renderAvailability(){
  const v=document.getElementById('availabilityView');
  const rows=availDefs.days.map((dn,di)=>`
    <div class="card"><h3>${esc(dn)}</h3>
      <div class="chips">${availDefs.slots.map(s=>
        `<button type="button" class="slotchip ${availState.has(di+':'+s.key)?'on':''}" data-day="${di}" data-key="${s.key}">${slotLabelHtml(s)}</button>`
      ).join('')}</div>
    </div>`).join('');
  v.innerHTML=`<div class="avail">
      <button class="back" id="availBack">‹ Today's jobs</button>
      <div style="padding:0 2px 12px;"><div class="big-name" style="font-size:19px;">My Availability</div>
        <div class="sub" style="color:var(--mute);font-size:13px;margin-top:4px;">Your normal weekly schedule — set it once. Tap a slot to add or remove it.</div></div>
      <div id="weeklyCards">${rows}</div>

      <div class="card" id="exceptionCard">
        <h3>One-time changes</h3>
        <div class="sub" style="color:var(--mute);font-size:13px;margin-bottom:10px;">Need a specific day off, or to pick up a slot you don't normally work? Pick the date and adjust just that day — your weekly schedule stays the same.</div>
        <input type="date" id="exDate" style="width:100%;background:var(--navy);border:1px solid var(--line);color:#fff;padding:12px;border-radius:10px;font-size:15px;">
        <div id="exEditor" class="hidden" style="margin-top:12px;">
          <div class="sub" id="exEditorLabel" style="color:var(--mute);font-size:13px;margin-bottom:8px;"></div>
          <div class="chips" id="exSlots"></div>
          <button type="button" class="btn ghost" id="exSave" style="margin-top:12px;">Save this date</button>
        </div>
        <div id="exList" style="margin-top:14px;"></div>
      </div>

      <div style="height:80px;"></div>
    </div>
    <div class="statusbar"><button class="btn big" id="availSave">Save Weekly Schedule</button></div>`;

  document.getElementById('availBack').addEventListener('click',showJobs);
  // Weekly toggles (scoped so the one-time editor's chips aren't affected).
  v.querySelectorAll('#weeklyCards .slotchip').forEach(ch=>ch.addEventListener('click',()=>{
    const k=ch.dataset.day+':'+ch.dataset.key;
    if(availState.has(k)){ availState.delete(k); ch.classList.remove('on'); }
    else { availState.add(k); ch.classList.add('on'); }
  }));
  document.getElementById('availSave').addEventListener('click',async()=>{
    const btn=document.getElementById('availSave'); btn.disabled=true;
    const slots=[...availState].map(s=>{ const [day,key]=s.split(':'); return { day_of_week:Number(day), slot_key:key }; });
    try{ await api('availability_set',{method:'POST',body:{slots}}); toast('Weekly schedule saved ✓'); }
    catch(e){ toast(e.message); }
    btn.disabled=false;
  });

  // One-time changes wiring.
  document.getElementById('exDate').addEventListener('change',e=>openExceptionEditor(e.target.value));
  document.getElementById('exSave').addEventListener('click',saveException);
  renderExceptionList();
}

// Slot keys the tech normally works on a given weekday (0=Sun..6=Sat).
function recurringKeysFor(dow){
  return availDefs.slots.filter(s=>availState.has(dow+':'+s.key)).map(s=>s.key);
}
// What the tech is actually available for on an exact date = recurring +/- exceptions.
function effectiveKeysForDate(dateStr){
  const dow=new Date(dateStr+'T00:00:00').getDay();
  const set=new Set(recurringKeysFor(dow));
  for(const ex of availExceptions){ if(ex.date===dateStr){ ex.is_available?set.add(ex.slot_key):set.delete(ex.slot_key); } }
  return set;
}
function dateLabel(dateStr){
  try{ return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}); }
  catch{ return dateStr; }
}

function openExceptionEditor(dateStr){
  if(!dateStr){ document.getElementById('exEditor').classList.add('hidden'); return; }
  exEditState=effectiveKeysForDate(dateStr);
  document.getElementById('exEditorLabel').textContent=`Your availability for ${dateLabel(dateStr)}:`;
  const box=document.getElementById('exSlots');
  box.innerHTML=availDefs.slots.map(s=>
    `<button type="button" class="slotchip ${exEditState.has(s.key)?'on':''}" data-key="${s.key}">${slotLabelHtml(s)}</button>`
  ).join('');
  box.querySelectorAll('.slotchip').forEach(ch=>ch.addEventListener('click',()=>{
    const k=ch.dataset.key;
    if(exEditState.has(k)){ exEditState.delete(k); ch.classList.remove('on'); }
    else { exEditState.add(k); ch.classList.add('on'); }
  }));
  document.getElementById('exEditor').classList.remove('hidden');
}

async function saveException(){
  const date=document.getElementById('exDate').value;
  if(!date){ toast('Pick a date first'); return; }
  const btn=document.getElementById('exSave'); btn.disabled=true;
  try{
    await api('availability_exception_set',{method:'POST',body:{date,selected:[...exEditState]}});
    toast('Saved for '+dateLabel(date)+' ✓');
    const d=await api('availability'); availExceptions=d.exceptions||[];
    renderExceptionList();
  }catch(e){ toast(e.message); }
  btn.disabled=false;
}

function renderExceptionList(){
  const el=document.getElementById('exList'); if(!el) return;
  const labelOf=k=>{ const s=availDefs.slots.find(x=>x.key===k); return s?s.label:k; };
  // Group exceptions by date.
  const byDate={};
  for(const ex of availExceptions){ (byDate[ex.date]=byDate[ex.date]||[]).push(ex); }
  const dates=Object.keys(byDate).sort();
  if(!dates.length){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="sub" style="color:var(--mute);font-size:13px;margin-bottom:6px;">Upcoming changes:</div>`+
    dates.map(date=>{
      const offs=byDate[date].filter(e=>!e.is_available).map(e=>labelOf(e.slot_key));
      const ons =byDate[date].filter(e=> e.is_available).map(e=>labelOf(e.slot_key));
      const parts=[];
      if(offs.length) parts.push(`Off: ${offs.join(', ')}`);
      if(ons.length)  parts.push(`Working: ${ons.join(', ')}`);
      return `<div style="background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;">
        <div style="font-weight:700;font-size:14px;">${esc(dateLabel(date))}</div>
        <div style="color:var(--mute);font-size:13px;margin:3px 0 8px;">${esc(parts.join(' · '))}</div>
        <button type="button" class="btn ghost sm" data-revert="${esc(date)}">Revert to normal</button>
      </div>`;
    }).join('');
  el.querySelectorAll('[data-revert]').forEach(b=>b.addEventListener('click',async()=>{
    const date=b.dataset.revert; b.disabled=true;
    const dow=new Date(date+'T00:00:00').getDay();
    try{
      await api('availability_exception_set',{method:'POST',body:{date,selected:recurringKeysFor(dow)}});
      toast('Reverted '+dateLabel(date));
      const d=await api('availability'); availExceptions=d.exceptions||[];
      if(document.getElementById('exDate').value===date) openExceptionEditor(date);
      renderExceptionList();
    }catch(e){ toast(e.message); b.disabled=false; }
  }));
}
