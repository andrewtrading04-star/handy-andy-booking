<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Tech App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome 6 (Free Solid & Regular) — used for Doms iconography -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer">
<style>
  :root{--navy:#0A1628;--navy-2:#0f2036;--navy-3:#16304f;--orange:#FF6B35;--orange-d:#e85a28;
    --ink:#e8eef6;--mute:#8aa0bd;--line:#1d3552;--green:#27c093;--red:#ff5d5d;--amber:#ffb020;--blue:#4aa3ff;
    /* Type system — Plus Jakarta Sans, weights 400–900 */
    --font-sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --fs-hero:clamp(32px,9vw,44px); --fs-h1:clamp(24px,6vw,30px); --fs-h2:20px;
    --fs-h3:18px; --fs-body:15px; --fs-sm:14px;
    /* Gradient keyword highlight (bright for dark navy bg) */
    --grad:linear-gradient(120deg,#ffb347 0%,#ff7a3d 50%,#ff4d7d 100%);}
  /* Doms brand palette — applied via body.doms for Doms technicians (e.g. George, TK).
     Remaps the accent away from Handy Andy orange to Doms primary blue (#0047AB),
     all in blue tones — no orange. */
  body.doms{--orange:#0047AB;--orange-d:#003580;
    --grad:linear-gradient(120deg,#4d8dff 0%,#2563eb 55%,#0047AB 100%);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-sans);background:var(--navy);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
  button{font-family:inherit;cursor:pointer;}
  .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  .hidden{display:none !important;}
  .wrap{max-width:520px;margin:0 auto;min-height:100vh;}

  /* Login */
  .login{padding:40px 24px;display:flex;flex-direction:column;min-height:100vh;justify-content:center;}
  .login h1{font-size:var(--fs-h1);font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .login .dot{width:12px;height:12px;border-radius:50%;background:var(--orange);}
  .login .sub{color:var(--mute);font-size:14px;margin-bottom:26px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  input{width:100%;background:var(--navy-2);border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:15px 16px;font-size:17px;}
  input:focus{outline:none;border-color:var(--orange);}
  #pin{letter-spacing:10px;text-align:center;font-size:24px;}
  .btn{background:var(--orange);color:#fff;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:700;width:100%;}
  .btn:hover{background:var(--orange-d);} .btn:disabled{opacity:.5;}
  .btn.big{padding:18px;font-size:18px;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);font-weight:600;}
  .btn.green{background:var(--green);} .btn.blue{background:var(--blue);}
  .err{color:var(--red);font-size:14px;margin-top:10px;text-align:center;min-height:20px;}

  /* Header */
  /* A gap ABOVE the header box (page background shows through) so it isn't
     jammed against the top edge / status bar. */
  #jobsView{padding-top:calc(18px + env(safe-area-inset-top, 0px));}
  .hdr{position:sticky;top:0;background:var(--navy-2);border-bottom:1px solid var(--line);padding:16px 18px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center;z-index:10;gap:8px;}
  .hdr .name{font-weight:800;font-size:17px;}
  .hdr .sub{font-size:12px;color:var(--mute);}
  .hdr button{background:transparent;border:1px solid var(--line);color:var(--mute);padding:7px 12px;border-radius:8px;font-size:13px;}
  .hdr button:hover{border-color:var(--ink);color:var(--ink);}
  .hdr-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}

  /* Week calendar strip */
  .weekbar{background:var(--navy-2);border-bottom:1px solid var(--line);padding:10px 8px;}
  .weekbar-top{display:flex;justify-content:space-between;align-items:center;padding:0 6px 8px;}
  .weekbar-title{font-size:13px;font-weight:700;color:var(--ink);}
  .weekbar-nav{display:flex;gap:6px;}
  .weekbar-nav button{background:transparent;border:1px solid var(--line);color:var(--mute);width:30px;height:30px;border-radius:8px;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .weekbar-nav button:hover{border-color:var(--ink);color:var(--ink);}
  .weekbar-today{font-size:12px;padding:0 10px !important;width:auto !important;}
  .weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .daycell{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:7px 2px 8px;text-align:center;cursor:pointer;position:relative;min-height:58px;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .daycell:hover{border-color:var(--mute);}
  .daycell.sel{background:var(--orange);border-color:var(--orange);}
  .daycell.sel .dc-dow,.daycell.sel .dc-num{color:#fff;}
  .daycell.today .dc-num{color:var(--orange);font-weight:800;}
  .daycell.sel.today .dc-num{color:#fff;}
  .dc-dow{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
  .dc-num{font-size:16px;font-weight:700;color:var(--ink);line-height:1;}
  .dc-count{font-size:10px;font-weight:700;background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;min-width:18px;}
  .daycell.sel .dc-count{background:rgba(255,255,255,.3);}
  .dc-count.empty{visibility:hidden;}

  /* Job list */
  .list{padding:14px;}
  .jobc{background:var(--navy-2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;}
  .jobc:active{border-color:var(--orange);}
  .jobc .t{font-weight:800;font-size:16px;color:var(--orange);}
  .jobc .n{font-weight:700;font-size:16px;margin-top:4px;}
  .jobc .m{color:var(--mute);font-size:14px;margin-top:4px;line-height:1.5;}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:capitalize;margin-top:8px;}
  .b-assigned{background:rgba(74,163,255,.16);color:var(--blue);}
  .b-on_the_way,.b-arrived,.b-in_progress{background:rgba(255,107,53,.18);color:var(--orange);}
  .b-completed{background:rgba(39,192,147,.16);color:var(--green);}
  .b-confirmed,.b-pending{background:rgba(255,176,32,.16);color:var(--amber);}
  .empty{color:var(--mute);text-align:center;padding:60px 20px;}

  /* Detail */
  .detail{padding:16px;}
  .back{background:transparent;border:none;color:var(--orange);font-size:15px;font-weight:600;padding:6px 0;margin-bottom:10px;}
  .card{background:var(--navy-2);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h3{font-size:13px;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .card .big-name{font-size:20px;font-weight:800;}
  .kv{font-size:15px;margin:7px 0;line-height:1.5;}
  .kv a{color:var(--blue);text-decoration:none;}
  /* Doms iconography — Font Awesome 6 glyphs, brand-accented */
  body.doms .kv > i{color:var(--orange);width:18px;text-align:center;margin-right:2px;}
  body.doms .btn.ghost > i{margin-right:4px;}
  /* Doms: blue badge tint instead of the orange one. */
  body.doms .b-on_the_way, body.doms .b-arrived, body.doms .b-in_progress{background:rgba(0,71,171,.16);}
  .notes{background:rgba(255,176,32,.08);border:1px solid rgba(255,176,32,.25);border-radius:10px;padding:12px;color:var(--amber);font-size:15px;line-height:1.5;}
  .statusbar{position:sticky;bottom:0;background:var(--navy);border-top:1px solid var(--line);padding:14px;display:flex;flex-direction:column;gap:10px;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy-3);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:14px;z-index:50;}

  /* Photos */
  .phreq{float:right;font-size:11px;font-weight:800;letter-spacing:.3px;color:var(--amber);background:rgba(255,176,32,.12);padding:2px 9px;border-radius:12px;text-transform:none;}
  .phreq.ok{color:var(--green);background:rgba(39,192,147,.14);}
  .photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--navy);}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .thumbdel{position:absolute;top:4px;right:4px;width:24px;height:24px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}
  /* Notes */
  .note{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;}
  .note-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .note-a{font-weight:700;font-size:13px;color:var(--ink);}
  .note-t{font-size:12px;color:var(--mute);}
  .note-b{font-size:14px;line-height:1.45;white-space:pre-wrap;word-break:break-word;}
  .note-del{background:transparent;border:none;color:var(--red);font-size:12px;padding:6px 0 0;font-weight:600;}
  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:8px;}
  .lightbox .lb-close{position:fixed;top:16px;right:18px;background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:22px;}
  .streetview{width:100%;height:auto;border-radius:10px;display:block;margin:12px 0;background:var(--navy);aspect-ratio:4/3;}

  /* Availability */
  .avail{padding:16px;}
  .hdr-actions{display:flex;gap:8px;}
  .chips{display:flex;flex-direction:column;gap:8px;}
  .slotchip{width:100%;text-align:left;background:var(--navy);border:1px solid var(--line);color:var(--mute);padding:13px 14px;border-radius:10px;font-size:15px;font-weight:600;}
  .slotchip.on{background:var(--orange);border-color:var(--orange);color:#fff;}
  .slotchip.on::after{content:'✓';float:right;font-weight:800;}
</style>
</head>
<body>
<div class="wrap">

  <!-- Login -->
  <div id="login" class="login">
    <h1><span class="dot"></span>Technician <span class="hl">Login</span></h1>
    <div class="sub">Sign in to see today's jobs</div>
    <form id="loginForm">
      <div class="field"><label>Phone number</label>
        <input type="tel" id="phone" placeholder="(555) 123-4567" autocomplete="username"></div>
      <div class="field"><label>4-digit PIN</label>
        <input type="tel" id="pin" maxlength="4" inputmode="numeric" placeholder="••••" autocomplete="current-password"></div>
      <button class="btn big" type="submit">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
    <!-- Dev bypass: always visible during development -->
    <div id="devPanel" style="margin-top:22px;padding-top:18px;border-top:1px dashed var(--line);">
      <div class="field"><label>🛠 Dev login (no PIN)</label>
        <select id="devTech" class="" style="width:100%;background:var(--navy-2);border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:14px;font-size:15px;"></select></div>
      <button class="btn ghost" type="button" id="devBtn">Enter as this tech</button>
    </div>
  </div>

  <!-- Jobs list -->
  <div id="jobsView" class="hidden">
    <div class="hdr">
      <div><div class="name" id="techName">—</div><div class="sub" id="jobsSub">Today's jobs</div></div>
      <div class="hdr-actions">
        <button id="availBtn">My Availability</button>
        <button id="reviewsBtn">⭐ Reviews</button>
        <button id="payrollBtn">💵 Payroll</button>
        <button id="logout">Log out</button>
      </div>
    </div>
    <div class="weekbar">
      <div class="weekbar-top">
        <div class="weekbar-title" id="weekTitle">—</div>
        <div class="weekbar-nav">
          <button id="weekToday" class="weekbar-today">Today</button>
          <button id="weekPrev" title="Previous week">‹</button>
          <button id="weekNext" title="Next week">›</button>
        </div>
      </div>
      <div class="weekgrid" id="weekGrid"></div>
    </div>
    <div class="list" id="jobsList"></div>
  </div>

  <!-- Job detail -->
  <div id="detailView" class="hidden"></div>

  <!-- Weekly availability -->
  <div id="availabilityView" class="hidden"></div>

  <!-- Payroll -->
  <div id="payrollView" class="hidden"></div>

  <!-- Reviews -->
  <div id="reviewsView" class="hidden"></div>

</div>

<!-- Photo lightbox -->
<div id="lightbox" class="lightbox hidden"><button class="lb-close" id="lbClose">×</button><img id="lightboxImg" src="" alt="photo"></div>

<!-- ETA Modal (shown when tech marks job as "on the way") -->
<div id="etaModal" class="lightbox hidden">
  <div style="background:#fff;border-radius:16px;padding:32px;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;">
    <h2 style="font-size:22px;font-weight:800;margin-bottom:8px;color:#222a35;">ETA to arrive?</h2>
    <p style="color:#7a8694;font-size:14px;margin-bottom:24px;">Let the customer know when you'll get there.</p>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <button class="btn" data-eta="30" style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;">30 minutes</button>
      <button class="btn" data-eta="45" style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;">45 minutes</button>
      <button class="btn" data-eta="60" style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;">60 minutes</button>
    </div>
  </div>
</div>

<script>
const API='/api/tech';
let token=localStorage.getItem('ha_tech_token')||'';
let tech=JSON.parse(localStorage.getItem('ha_tech_info')||'null');

async function api(action,{method='GET',params={},body=null}={}){
  const url=new URL(API,location.origin); url.searchParams.set('action',action);
  for(const[k,v]of Object.entries(params)) if(v!=null&&v!=='') url.searchParams.set(k,v);
  const res=await fetch(url,{method,headers:{'Content-Type':'application/json',...(token&&{Authorization:`Bearer ${token}`})},body:body?JSON.stringify(body):undefined});
  if(res.status===401){ logout(); throw new Error('Session expired'); }
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Strip the category prefix ("TV Size: ", "Bracket: ", "Fireplace: ", "Wall Surface: ", …)
// so payment line items read as the bare option (e.g. "33-59 inch").
function liName(name){ const s=String(name||''); const i=s.indexOf(':'); return (i>-1?s.slice(i+1):s).trim()||s; }
// Street View of the job. Prefer exact lat/lng; otherwise let Google geocode the
// address string (manual bookings have no coordinates). Needs the Maps Static
// API key, which the server sends as j.maps_key. Falls back to a directions link
// or a plain message when neither a key nor a location is available.
function streetViewHtml(j){
  const loc = (j.lat&&j.lng) ? `${j.lat},${j.lng}` : (j.address||'');
  if(j.maps_key && loc){
    const src=`https://maps.googleapis.com/maps/api/streetview?size=600x450&location=${encodeURIComponent(loc)}&fov=90&pitch=0&key=${encodeURIComponent(j.maps_key)}`;
    return `<img class="streetview" src="${src}" alt="Street View of job location" onerror="this.style.display='none'">`;
  }
  return `<div class="sub" style="color:var(--mute);font-size:13px;padding:12px 0;">${ic('location')} Street View unavailable</div>`;
}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
function fmtTime(iso){ if(!iso)return'—'; try{return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:bizTz});}catch{return iso;} }

// ── Iconography ────────────────────────────────────────────────────────────
// Handy Andy keeps emoji icons; Doms uses Font Awesome 6 (Free Solid/Regular).
const ICONS = {
  tools:    {e:'🛠', f:'fa-solid fa-screwdriver-wrench'},
  wrench:   {e:'🔧', f:'fa-solid fa-wrench'},
  phone:    {e:'📞', f:'fa-solid fa-phone'},
  location: {e:'📍', f:'fa-solid fa-location-dot'},
  navigate: {e:'🧭', f:'fa-solid fa-diamond-turn-right'},
  camera:   {e:'📷', f:'fa-solid fa-camera'},
};
function isDoms(){ return !!(tech && tech.slug==='doms'); }
function ic(name){ const m=ICONS[name]; if(!m) return ''; return isDoms() ? `<i class="${m.f}"></i>` : m.e; }
function applyIconTheme(){
  const doms=isDoms();
  document.body.classList.toggle('doms', doms);
  document.querySelectorAll('[data-ico]').forEach(el=>{
    const m=ICONS[el.dataset.ico]; if(!m) return;
    el.innerHTML = doms ? `<i class="${m.f}"></i>` : m.e;
  });
}

// Login
document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('loginErr'); err.textContent='';
  try{
    const d=await api('login',{method:'POST',body:{phone:document.getElementById('phone').value.trim(),pin:document.getElementById('pin').value.trim()}});
    token=d.token; tech=d.technician;
    localStorage.setItem('ha_tech_token',token); localStorage.setItem('ha_tech_info',JSON.stringify(tech));
    showJobs();
  }catch(e2){ err.textContent=e2.message; }
});
function logout(){ token='';tech=null; localStorage.removeItem('ha_tech_token');localStorage.removeItem('ha_tech_info');
  show('login'); }
document.getElementById('logout').addEventListener('click',logout);

function show(which){
  for(const id of ['login','jobsView','detailView','availabilityView','payrollView','reviewsView']) document.getElementById(id).classList.toggle('hidden',id!==which);
}

// All day math runs in the BUSINESS timezone so the tech app's calendar lines
// up with the dashboard and the booking times — never the device's timezone.
let bizTz = (tech && tech.tz) || 'America/Denver';
function todayStr(){ return new Intl.DateTimeFormat('en-CA',{timeZone:bizTz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date()); }
let scheduleDate=todayStr();           // selected day (YYYY-MM-DD, business tz)
let weekJobs=[];                       // all jobs in the visible week

// Calendar-date math on 'YYYY-MM-DD' strings via a noon-UTC anchor. A calendar
// date's weekday/number are timezone-independent, so this never drifts.
function dateAnchor(ds){ return new Date(ds+'T12:00:00Z'); }
function dowOf(ds){ return dateAnchor(ds).getUTCDay(); }            // 0..6 Sun..Sat
function addDaysStr(ds,n){ const d=dateAnchor(ds); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().split('T')[0]; }
function weekStartStr(ds){ return addDaysStr(ds, -dowOf(ds)); }     // Sunday of ds's week
function dayNum(ds){ return Number(ds.split('-')[2]); }
function fmtDs(ds,opts){ return new Intl.DateTimeFormat('en-US',{timeZone:'UTC',...opts}).format(dateAnchor(ds)); }
// Business-tz calendar date for a job (server sends local_date; fall back if not).
function jobLocalDate(j){ return j.local_date || new Intl.DateTimeFormat('en-CA',{timeZone:bizTz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(j.scheduled_at)); }

async function showJobs(date){
  if(date) scheduleDate=date;
  show('jobsView');
  applyIconTheme();
  document.getElementById('techName').textContent=tech?tech.name:'';
  await loadWeek();
}

async function loadWeek(){
  const start=weekStartStr(scheduleDate);
  const days=[...Array(7)].map((_,i)=>addDaysStr(start,i));
  const end=days[6];
  // Week title (e.g. "June 14–20" or spanning months).
  const sameMonth=days[0].slice(0,7)===end.slice(0,7);
  document.getElementById('weekTitle').textContent = sameMonth
    ? `${fmtDs(days[0],{month:'long'})} ${dayNum(days[0])}–${dayNum(end)}`
    : `${fmtDs(days[0],{month:'short',day:'numeric'})} – ${fmtDs(end,{month:'short',day:'numeric'})}`;

  const grid=document.getElementById('weekGrid');
  const list=document.getElementById('jobsList');
  const today=todayStr();
  grid.innerHTML=days.map(ds=>`
    <div class="daycell${ds===scheduleDate?' sel':''}${ds===today?' today':''}" data-date="${ds}">
      <span class="dc-dow">${fmtDs(ds,{weekday:'short'}).slice(0,2)}</span>
      <span class="dc-num">${dayNum(ds)}</span>
      <span class="dc-count empty" data-count="${ds}">0</span>
    </div>`).join('');
  grid.querySelectorAll('.daycell').forEach(c=>c.addEventListener('click',()=>{ scheduleDate=c.dataset.date; renderDay(); markSelected(); }));

  list.innerHTML='<div class="empty">Loading…</div>';
  try{
    const d=await api('jobs',{params:{from:days[0],to:end}});
    weekJobs=d.jobs||[];
    if(d.tz) bizTz=d.tz;   // keep device in sync with the business timezone
    // Per-day counts on the calendar (grouped by business-tz date).
    const counts={};

}

// Resize/compress on-device so uploads stay small & fast.
function compressImage(file,maxDim=1600,quality=0.8){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width,h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality)); };
      img.onerror=()=>reject(new Error('Could not read that image.')); img.src=reader.result; };
    reader.onerror=()=>reject(new Error('Could not read that file.')); reader.readAsDataURL(file);
  });
}
async function uploadPhotos(id, files){
  const list=[...(files||[])].filter(f=>f.type.startsWith('image/'));
  if(!list.length) return;
  toast(`Uploading ${list.length} photo${list.length===1?'':'s'}…`);
  let ok=0;
  for(const f of list){
    try{ const dataUrl=await compressImage(f); await api('job_photo_add',{method:'POST',body:{id,image:dataUrl}}); ok++; }
    catch(e){ toast(e.message); }
  }
  if(ok) toast(`${ok} photo${ok===1?'':'s'} added ✓`);
  showDetail(id);
}

function relTime(iso){
  try{ const d=new Date(iso), s=(Date.now()-d.getTime())/1000;
    if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago';
    if(s<86400) return Math.floor(s/3600)+'h ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
  catch{ return ''; }
}

// Slot keys the tech normally works on a given weekday (0=Sun..6=Sat).
function recurringKeysFor(dow){
  return availDefs.slots.filter(s=>availState.has(dow+':'+s.key)).map(s=>s.key);
}
// What the tech is actually available for on an exact date = recurring +/- exceptions.
function effectiveKeysForDate(dateStr){
  const dow=new Date(dateStr+'T00:00:00').getDay();
  const set=new Set(recurringKeysFor(dow));
  for(const ex of availExceptions){ if(ex.date===dateStr){ ex.is_available?set.add(ex.slot_key):set.delete(ex.slot_key); } }
  return set;
}
function dateLabel(dateStr){
  try{ return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}); }
  catch{ return dateStr; }
}

function openExceptionEditor(dateStr){
  if(!dateStr){ document.getElementById('exEditor').classList.add('hidden'); return; }
  exEditState=effectiveKeysForDate(dateStr);
  document.getElementById('exEditorLabel').textContent=`Your availability for ${dateLabel(dateStr)}:`;
  const box=document.getElementById('exSlots');
  box.innerHTML=availDefs.slots.map(s=>
    `<button type="button" class="slotchip ${exEditState.has(s.key)?'on':''}" data-key="${s.key}">${esc(s.label)}</button>`
  ).join('');
  box.querySelectorAll('.slotchip').forEach(ch=>ch.addEventListener('click',()=>{
    const k=ch.dataset.key;
    if(exEditState.has(k)){ exEditState.delete(k); ch.classList.remove('on'); }
    else { exEditState.add(k); ch.classList.add('on'); }
  }));
  document.getElementById('exEditor').classList.remove('hidden');
}

async function saveException(){
  const date=document.getElementById('exDate').value;
  if(!date){ toast('Pick a date first'); return; }
  const btn=document.getElementById('exSave'); btn.disabled=true;
  try{
    await api('availability_exception_set',{method:'POST',body:{date,selected:[...exEditState]}});
    toast('Saved for '+dateLabel(date)+' ✓');
    const d=await api('availability'); availExceptions=d.exceptions||[];
    renderExceptionList();
  }catch(e){ toast(e.message); }
  btn.disabled=false;
}

function renderExceptionList(){
  const el=document.getElementById('exList'); if(!el) return;
  const labelOf=k=>{ const s=availDefs.slots.find(x=>x.key===k); return s?s.label:k; };
  // Group exceptions by date.
  const byDate={};
  for(const ex of availExceptions){ (byDate[ex.date]=byDate[ex.date]||[]).push(ex); }
  const dates=Object.keys(byDate).sort();
  if(!dates.length){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="sub" style="color:var(--mute);font-size:13px;margin-bottom:6px;">Upcoming changes:</div>`+
    dates.map(date=>{
      const offs=byDate[date].filter(e=>!e.is_available).map(e=>labelOf(e.slot_key));
      const ons =byDate[date].filter(e=> e.is_available).map(e=>labelOf(e.slot_key));
      const parts=[];
      if(offs.length) parts.push(`Off: ${offs.join(', ')}`);
      if(ons.length)  parts.push(`Working: ${ons.join(', ')}`);
      return `<div style="background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;">
        <div style="font-weight:700;font-size:14px;">${esc(dateLabel(date))}</div>
        <div style="color:var(--mute);font-size:13px;margin:3px 0 8px;">${esc(parts.join(' · '))}</div>
        <button type="button" class="btn ghost sm" data-revert="${esc(date)}">Revert to normal</button>
      </div>`;
    }).join('');
  el.querySelectorAll('[data-revert]').forEach(b=>b.addEventListener('click',async()=>{
    const date=b.dataset.revert; b.disabled=true;
    const dow=new Date(date+'T00:00:00').getDay();
    try{
      await api('availability_exception_set',{method:'POST',body:{date,selected:recurringKeysFor(dow)}});
      toast('Reverted '+dateLabel(date));
      const d=await api('availability'); availExceptions=d.exceptions||[];
      if(document.getElementById('exDate').value===date) openExceptionEditor(date);
      renderExceptionList();
    }catch(e){ toast(e.message); b.disabled=false; }
  }));
}

  if(!payrollWeekStart) payrollWeekStart=weekStartStr(todayStr());

  v.innerHTML=`<div class="detail"><div class="empty">Loading…</div></div>`;
  try{
    const d=await api('tech_payroll',{params:{week_start:payrollWeekStart}});
    renderPayroll(d);
  }catch(e){
    v.innerHTML=`<div class="detail"><button class="back" id="payrollBack">‹ Back</button><div class="empty" style="color:var(--red);">${esc(e.message)}</div></div>`;
    document.getElementById('payrollBack').addEventListener('click',showJobs);
  }
}

function renderPayroll(data){
  const v=document.getElementById('payrollView');
  const weekEnd=addDaysStr(payrollWeekStart,6);
  const payDate=data.pay_date||addDaysStr(weekEnd,9);

  const paidJobs=data.jobs||[];
  const deferredJobs=data.deferred||[];
  const reviewCount=paidJobs.filter(j=>j.needs_review).length;

  const jobRows=paidJobs.map(j=>{
    const bd=(j.breakdown||[]).map(b=>`<div style="display:flex;justify-content:space-between;color:var(--mute);font-size:12px;padding:1px 0;"><span>${esc(b.label)}</span><span>$${b.amount}</span></div>`).join('');
    const fl=(j.flags||[]).map(f=>`<div style="color:var(--amber);font-size:12px;margin-top:3px;">⚠ ${esc(f)}</div>`).join('');
    return `
    <div style="padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;">
          <div style="font-weight:700;">${esc(j.customer_name)}${j.needs_review?' <span style="color:var(--amber);font-size:11px;font-weight:700;">· REVIEW</span>':''}</div>
          <div style="color:var(--mute);font-size:12px;margin-bottom:4px;">${esc(j.service||'Service')} · ${esc(j.time)}</div>
          ${bd}
          ${fl}
        </div>
        <div style="text-align:right;font-weight:800;font-size:15px;">$${j.tech_pay}</div>
      </div>
    </div>`;}).join('');

  const deferredRows=deferredJobs.length ? `
    <div class="card">
      <h3 style="color:var(--amber);">⏳ Awaiting Payment (${deferredJobs.length})</h3>
      <div style="color:var(--mute);font-size:13px;">These jobs are completed but not yet fully paid. Once paid, they'll be added to payroll.</div>
      ${deferredJobs.map(j=>`
        <div style="padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;">
          <div style="font-weight:600;">${esc(j.customer_name)}</div>
          <div style="color:var(--mute);font-size:12px;">${esc(j.time)} — Due: $${j.customer_due}</div>
        </div>`).join('')}
    </div>` : '';

  v.innerHTML=`<div class="detail">
    <button class="back" id="payrollBack">‹ Today's jobs</button>

    <div style="padding:0 2px 12px;"><div class="big-name" style="font-size:19px;">Payroll</div>
      <div class="sub" style="color:var(--mute);font-size:13px;margin-top:4px;">Weekly earnings</div></div>

    <div class="card">
      <h3>Week of ${fmtDs(payrollWeekStart,{month:'short',day:'numeric'})} – ${fmtDs(weekEnd,{month:'short',day:'numeric'})}</h3>
      <div style="display:grid;grid-template-columns:1fr auto;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);margin-bottom:12px;">
        <div style="font-size:13px;color:var(--mute);">Pay Date</div>
        <div style="font-weight:700;">${fmtDs(payDate,{month:'short',day:'numeric'})}</div>
      </div>
    </div>

    <div class="card">
      <h3>Paid Jobs (${paidJobs.length})${reviewCount?` <span style="color:var(--amber);font-size:11px;">· ${reviewCount} need review</span>`:''}</h3>
      ${paidJobs.length ? jobRows : '<div class="sub" style="color:var(--mute);">No completed, paid jobs this week.</div>'}
    </div>

    ${deferredRows}

    <div class="card">
      <div style="display:grid;grid-template-columns:1fr auto;gap:12px;">
        <div style="color:var(--mute);font-size:13px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;">Weekly Total</div>
        <div style="font-size:24px;font-weight:800;color:var(--green);">$${data.total}</div>
      </div>
    </div>

    <div style="height:60px;"></div>
  </div>
  <div class="statusbar">
    <button class="btn ghost" id="payrollPrev">‹ Previous week</button>
    <button class="btn ghost" id="payrollNext">Next week ›</button>
  </div>`;

  document.getElementById('payrollBack').addEventListener('click',showJobs);
  document.getElementById('payrollPrev').addEventListener('click',()=>{
    payrollWeekStart=addDaysStr(payrollWeekStart,-7);
    showPayroll();
  });
  document.getElementById('payrollNext').addEventListener('click',()=>{
    payrollWeekStart=addDaysStr(payrollWeekStart,7);
    showPayroll();
  });
}

// ── Reviews ──────────────────────────────────────────────────────────────────
// A row of 5 stars; the first `n` (rounded) are filled (amber), the rest hollow.
function starRow(n, size){
  const filled=Math.round(Number(n)||0);
  let s='';
  for(let i=1;i<=5;i++) s+=`<span style="color:${i<=filled?'var(--amber)':'var(--line)'};">★</span>`;
  return `<span style="font-size:${size||16}px;letter-spacing:2px;line-height:1;">${s}</span>`;
}
// Short date for a review (prefer when it was reviewed; fall back to job date).
function reviewWhen(r){
  const iso=(r&&(r.reviewed_at||r.scheduled_at))||null;
  if(!iso) return '';
  try{ return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:bizTz}); }
  catch{ return ''; }
}
// One review card: stars, the service/job it was for, the customer, and the comment.
function reviewCard(r){
  return `<div class="card" style="margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
      ${starRow(r.rating,17)}
      <span class="note-t">${esc(reviewWhen(r))}</span>
    </div>
    <div class="kv" style="margin:9px 0 2px;font-weight:700;">${ic('wrench')} ${esc(r.service||'Service')}</div>
    <div class="sub" style="color:var(--mute);font-size:13px;">${esc(r.customer_name||'Customer')}</div>
    ${r.text
      ? `<div class="note-b" style="margin-top:9px;background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:11px 12px;">“${esc(r.text)}”</div>`
      : '<div class="sub" style="color:var(--mute);font-size:13px;margin-top:7px;font-style:italic;">No comment left.</div>'}
  </div>`;
}

async function showReviews(){
  show('reviewsView');
  const v=document.getElementById('reviewsView');
  v.innerHTML='<div class="detail"><div class="empty">Loading…</div></div>';
  try{
    const d=await api('tech_reviews');
    renderReviews(d);
  }catch(e){
    v.innerHTML=`<div class="detail"><button class="back" id="reviewsBack">‹ Today's jobs</button><div class="empty" style="color:var(--red);">${esc(e.message)}</div></div>`;
    document.getElementById('reviewsBack').addEventListener('click',showJobs);
  }
}

function renderReviews(data){
  const v=document.getElementById('reviewsView');
  const avg=Number(data.average)||0, total=Number(data.total)||0, wk=Number(data.week_count)||0;
  const reviews=data.reviews||[];
  const weekReviews=reviews.filter(r=>r.this_week);
  const olderReviews=reviews.filter(r=>!r.this_week);
  const sectionHead=(t)=>`<div style="font-size:13px;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin:14px 2px 8px;">${esc(t)}</div>`;

  v.innerHTML=`<div class="detail">
    <button class="back" id="reviewsBack">‹ Today's jobs</button>

    <div style="padding:0 2px 12px;"><div class="big-name" style="font-size:19px;">My Reviews</div>
      <div class="sub" style="color:var(--mute);font-size:13px;margin-top:4px;">What your customers are saying</div></div>

    <div class="card" style="text-align:center;">
      <div style="font-size:46px;font-weight:900;line-height:1;">${total?avg.toFixed(1):'—'}</div>
      <div style="margin:10px 0 6px;">${starRow(avg,24)}</div>
      <div class="sub" style="color:var(--mute);font-size:13px;">${total} review${total===1?'':'s'} all-time</div>
      <div style="display:flex;justify-content:center;gap:10px;margin-top:16px;">
        <div style="background:var(--navy);border:1px solid var(--line);border-radius:12px;padding:12px 22px;">
          <div style="font-size:24px;font-weight:800;color:var(--green);">${wk}</div>
          <div class="sub" style="color:var(--mute);font-size:12px;">This week</div>
        </div>
      </div>
    </div>

    ${weekReviews.length?sectionHead('This week')+weekReviews.map(reviewCard).join(''):''}
    ${olderReviews.length?sectionHead(weekReviews.length?'Earlier':'Recent')+olderReviews.map(reviewCard).join(''):''}
    ${!reviews.length?'<div class="empty">No reviews yet.<br>Complete jobs and customers will be invited to leave one. ⭐</div>':''}

    <div style="height:40px;"></div>
  </div>`;
  document.getElementById('reviewsBack').addEventListener('click',showJobs);
}

// Dev bypass: load the no-PIN tech picker. Surfaces failures into the dropdown
// (instead of silently leaving it empty) and retries once for serverless cold
// starts, so an empty list is always explainable.
async function initDevPanel(attempt){
  attempt=attempt||1;
  const sel=document.getElementById('devTech');
  const setPlaceholder=(txt)=>{ sel.innerHTML=`<option value="" disabled selected>${esc(txt)}</option>`; };
  setPlaceholder('Loading technicians…');
  try{
    const res=await fetch(new URL(API+'?action=dev_techs',location.origin),{cache:'no-store'});
    if(!res.ok){
      let msg='HTTP '+res.status;
      try{ const e=await res.json(); if(e&&e.error) msg=e.error; }catch{}
      // Cold start / transient: retry once before giving up.
      if(attempt<2){ return initDevPanel(attempt+1); }
      setPlaceholder('Couldn’t load techs ('+msg+')');
      return;
    }
    const d=await res.json();
    if(!d.technicians||!d.technicians.length){
      setPlaceholder('No active technicians found');
      return;
    }
    sel.innerHTML=d.technicians.map(t=>`<option value="${t.id}">${esc(t.name)} — ${esc(t.business)}</option>`).join('');
  }catch(e){
    if(attempt<2){ return initDevPanel(attempt+1); }
    setPlaceholder('Couldn’t load techs (network)');
  }
}
document.getElementById('devBtn').addEventListener('click',async()=>{
  const techId=document.getElementById('devTech').value;
  if(!techId){ document.getElementById('loginErr').textContent='Pick a technician first (list still loading or failed).'; return; }
  try{
    const d=await api('dev_login',{method:'POST',body:{tech_id:techId}});
    token=d.token; tech=d.technician;
    localStorage.setItem('ha_tech_token',token); localStorage.setItem('ha_tech_info',JSON.stringify(tech));
    showJobs();
  }catch(e){ document.getElementById('loginErr').textContent=e.message; }
});

// Lightbox close (tap backdrop or ×)
document.getElementById('lbClose').addEventListener('click',()=>document.getElementById('lightbox').classList.add('hidden'));
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target.id==='lightbox') document.getElementById('lightbox').classList.add('hidden'); });

// Boot
if(token&&tech) showJobs(); else { show('login'); initDevPanel(); }
</script>
