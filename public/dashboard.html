<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handy Andy — Booking Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --accent:#ff6600; --accent-soft:rgba(255,102,0,0.12); --green:#10b981; --red:#ef4444; --ink:#1a1a1a; --mute:#8a8a93; --line:#e8e8ec; --card:#fff; --bg:#f4f5f7; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:var(--ink); padding:18px; }
  .container { max-width:1280px; margin:0 auto; }
  .header { display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center; margin-bottom:20px; }
  h1 { font-size:22px; }
  .sub { font-size:12px; color:var(--mute); margin-top:3px; }
  .ranges { display:flex; gap:6px; }
  .ranges button { border:1px solid var(--line); background:#fff; color:var(--mute); padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; }
  .ranges button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .grid { display:grid; gap:14px; }
  .kpis { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); margin-bottom:18px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .kpi .lbl { font-size:11px; color:var(--mute); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px; }
  .kpi .val { font-size:26px; font-weight:800; }
  .kpi .extra { font-size:12px; color:var(--mute); margin-top:4px; }
  .kpi .good { color:var(--green); } .kpi .bad { color:var(--red); }
  h2 { font-size:15px; margin-bottom:12px; }
  .section { margin-bottom:18px; }
  .two { grid-template-columns:1fr 1fr; } .three { grid-template-columns:1fr 1fr 1fr; }
  @media(max-width:900px){ .two,.three{grid-template-columns:1fr;} }
  /* funnel */
  .fstep { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .flbl { width:120px; font-size:12.5px; color:var(--mute); text-align:right; flex-shrink:0; }
  .ftrack { flex:1; background:#f0f1f4; border-radius:6px; height:34px; position:relative; overflow:hidden; }
  .fbar { height:100%; background:linear-gradient(to right,var(--accent),#cc5200); border-radius:6px; display:flex; align-items:center; padding:0 10px; color:#fff; font-size:12.5px; font-weight:700; min-width:fit-content; white-space:nowrap; }
  .fdrop { width:150px; font-size:12px; flex-shrink:0; }
  .fdrop b { color:var(--red); }
  .fpct { color:var(--mute); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--mute); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; padding:6px 8px; border-bottom:1px solid var(--line); }
  th.num, td.num { text-align:right; }
  td { padding:8px; border-bottom:1px solid #f3f3f6; }
  tr:last-child td { border-bottom:none; }
  .convgood { color:var(--green); font-weight:700; } .convzero { color:var(--mute); }
  .chartbox { position:relative; height:240px; }
  .pill { display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .pill.green { background:rgba(16,185,129,0.12); color:var(--green); }
  .pill.gray { background:#f0f1f4; color:var(--mute); }
  .pill.red { background:rgba(239,68,68,0.1); color:var(--red); }
  .pill.blue { background:rgba(59,130,246,0.12); color:#3b82f6; }
  .qblock { margin-bottom:16px; }
  .qtitle { font-size:13px; font-weight:700; margin-bottom:8px; }
  .abar { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12.5px; }
  .alabel { width:42%; min-width:170px; color:#444; }
  .atrack { flex:1; background:#f0f1f4; height:18px; border-radius:4px; overflow:hidden; }
  .afill { height:100%; background:var(--accent-soft); border-left:3px solid var(--accent); }
  .acount { width:54px; text-align:right; font-weight:700; }
  .aconv { width:74px; text-align:right; color:var(--mute); font-size:11.5px; }
  .empty { color:var(--mute); font-size:13px; padding:14px 0; text-align:center; }
  .err { background:#fff5f5; border:1px solid #ffd9d9; border-radius:12px; }
  .loading { text-align:center; padding:60px; color:var(--mute); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📊 Handy Andy — Booking Analytics</h1>
      <div class="sub" id="updated">Loading…</div>
    </div>
    <div class="ranges" id="ranges">
      <button data-days="1">Today</button>
      <button data-days="7">7 Days</button>
      <button data-days="30" class="on">30 Days</button>
      <button data-days="0">All Time</button>
    </div>
  </div>
  <div id="content" class="loading">Loading analytics…</div>
</div>

<script>
const QUESTION_LABELS = {
  frame_tv:'TV Type', size:'TV Size', bracket:'Bracket Choice', fireplace:'Fireplace',
  surface:'Wall Surface', wires:'Wire Hiding', lifting:'Lifting Help', dismount:'Dismount Offer',
  extras:'Add-ons Picked', slot:'Chosen Time Slot', slot_day:'Chosen Day of Week',
  tip:'Tip Selected', coupon:'Coupon Used',
};
const QUESTION_ORDER = ['frame_tv','size','bracket','fireplace','surface','wires','lifting','dismount','extras','slot_day','slot','tip','coupon'];
let currentDays = 30, charts = {}, timer = null;

document.getElementById('ranges').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  currentDays = parseInt(b.dataset.days);
  document.querySelectorAll('#ranges button').forEach(x => x.classList.toggle('on', x === b));
  load();
});

function fmt$(n){ if(n==null)return '—'; return '$' + Number(n).toLocaleString('en-US',{maximumFractionDigits:0}); }
function fmtDur(s){ if(s==null)return '—'; if(s<60)return s+'s'; const m=Math.floor(s/60); return m+'m '+(s%60)+'s'; }
function esc(t){ return String(t??'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function convCell(c,b){ return b>0 ? `<span class="convgood">${c}%</span>` : `<span class="convzero">—</span>`; }

async function load(){
  try{
    const r = await fetch('/api/analytics?days=' + currentDays);
    if(!r.ok) throw new Error('API error ' + r.status);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    render(d);
  }catch(err){
    document.getElementById('content').innerHTML = `<div class="card err" style="padding:18px;">Error loading analytics: ${esc(err.message)}</div>`;
  }
}

function render(d){
  const t = d.totals;
  document.getElementById('updated').textContent =
    'Updated ' + new Date(d.lastUpdated).toLocaleTimeString() + ' · times in Mountain Time · auto-refreshes';

  const kpis = [
    ['Sessions', t.sessions, `${t.visitors} unique visitors`],
    ['Bookings', t.bookings, t.bookingFailures>0?`<span class="bad">${t.bookingFailures} failed attempts</span>`:'no failed attempts'],
    ['Conversion', t.conversion+'%', 'of all sessions'],
    ['Revenue (booked)', fmt$(t.revenue), `avg ticket ${fmt$(t.avgTicket)}`],
    ['Saw a Price', t.priceShown, `${t.priceToBooking}% then booked`],
    ['Abandoned Carts', t.abandonedCarts, `<span class="bad">${fmt$(t.lostValue)} quoted, not booked</span>`],
    ['Median Time to Book', fmtDur(t.medianTimeToBookSec), `session length ${fmtDur(t.medianSessionSec)}`],
    ['Repeat Visitors', t.repeatVisitors, `${t.bookingsFromRepeat} bookings from returners`],
    ['Bounced', t.bounces, 'left on first step'],
    ['ZIP Checks', (t.zipServed+t.zipUnserved), `<span class="bad">${t.zipUnserved} outside area</span>`],
  ];
  let html = `<div class="grid kpis">` + kpis.map(k =>
    `<div class="card kpi"><div class="lbl">${k[0]}</div><div class="val">${k[1]??'—'}</div><div class="extra">${k[2]||''}</div></div>`
  ).join('') + `</div>`;

  // Funnel
  const start = d.funnel[0]?.reached || 0;
  html += `<div class="section card"><h2>Step-by-Step Funnel — where people drop off</h2>`;
  if(!start){ html += `<div class="empty">No sessions in this period yet.</div>`; }
  else d.funnel.forEach(f=>{
    const pct = start ? Math.round(f.reached/start*100) : 0;
    html += `<div class="fstep">
      <div class="flbl">${f.label}</div>
      <div class="ftrack"><div class="fbar" style="width:${Math.max(pct,5)}%;">${f.reached}</div></div>
      <div class="fdrop">${f.droppedHere>0?`<b>−${f.droppedHere} left here</b>`:`<span class="fpct">no drop-off</span>`} <span class="fpct">· ${pct}%</span></div>
    </div>`;
  });
  html += `</div>`;

  // Charts row
  html += `<div class="grid two section">
    <div class="card"><h2>Sessions & Bookings by Day</h2><div class="chartbox"><canvas id="ch-timeline"></canvas></div></div>
    <div class="card"><h2>Activity by Hour of Day</h2><div class="chartbox"><canvas id="ch-hour"></canvas></div></div>
  </div>
  <div class="grid two section">
    <div class="card"><h2>Activity by Day of Week</h2><div class="chartbox"><canvas id="ch-dow"></canvas></div></div>
    <div class="card"><h2>Device / Source / Browser</h2>${segTables(d)}</div>
  </div>`;

  // Geo
  html += `<div class="grid three section">
    <div class="card"><h2>Top Cities</h2>${tbl(d.byCity,'City')}</div>
    <div class="card"><h2>Top ZIP Codes</h2>${tbl(d.byZip,'ZIP')}</div>
    <div class="card"><h2>ZIPs We Turned Away</h2>${unservedTbl(d.unservedZips)}</div>
  </div>`;

  // Answers
  html += `<div class="section card"><h2>What People Choose on Each Question</h2>${answersHtml(d.answers)}</div>`;

  // Errors
  html += `<div class="grid two section">
    <div class="card"><h2>Errors by Step</h2>${errStepTbl(d.errors.byStep)}</div>
    <div class="card"><h2>Recent Errors</h2>${errTbl(d.errors.recent)}</div>
  </div>`;

  // Recent sessions
  html += `<div class="section card"><h2>Recent Sessions</h2>${sessionsTbl(d.recentSessions)}</div>`;

  document.getElementById('content').innerHTML = html;
  drawCharts(d);
}

function segTables(d){
  const seg = (title, rows) => {
    if(!rows.length) return '';
    return `<div style="margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:var(--mute);text-transform:uppercase;margin-bottom:4px;">${title}</div>
      <table><tr><th></th><th class="num">Sessions</th><th class="num">Bookings</th><th class="num">Conv</th></tr>` +
      rows.map(r=>`<tr><td>${esc(r.key)}</td><td class="num">${r.sessions}</td><td class="num">${r.bookings}</td><td class="num">${convCell(r.conv,r.bookings)}</td></tr>`).join('') +
      `</table></div>`;
  };
  return seg('Device', d.byDevice) + seg('Traffic Source', d.bySource) + seg('Browser', d.byBrowser);
}
function tbl(rows, name){
  if(!rows||!rows.length) return `<div class="empty">No data yet.</div>`;
  return `<table><tr><th>${name}</th><th class="num">Sessions</th><th class="num">Bookings</th><th class="num">Conv</th></tr>` +
    rows.map(r=>`<tr><td>${esc(r.key)}</td><td class="num">${r.sessions}</td><td class="num">${r.bookings}</td><td class="num">${convCell(r.conv,r.bookings)}</td></tr>`).join('') + `</table>`;
}
function unservedTbl(rows){
  if(!rows||!rows.length) return `<div class="empty">None — every ZIP checked was in your service area.</div>`;
  return `<table><tr><th>ZIP</th><th class="num">Times Checked</th></tr>` +
    rows.map(r=>`<tr><td>${esc(r.zip)}</td><td class="num">${r.count}</td></tr>`).join('') +
    `</table><div style="font-size:11.5px;color:var(--mute);margin-top:8px;">Demand from outside your service area — possible expansion targets.</div>`;
}
function answersHtml(answers){
  if(!answers||!answers.length) return `<div class="empty">No answers recorded yet — data starts flowing with the next visitors.</div>`;
  const map = Object.fromEntries(answers.map(a=>[a.question,a]));
  const ordered = QUESTION_ORDER.filter(q=>map[q]).concat(answers.map(a=>a.question).filter(q=>!QUESTION_ORDER.includes(q)));
  return `<div class="grid two">` + ordered.map(q=>{
    const a = map[q];
    const max = Math.max(...a.options.map(o=>o.picked), 1);
    return `<div class="qblock"><div class="qtitle">${QUESTION_LABELS[q]||q}</div>` +
      a.options.map(o=>`<div class="abar">
        <div class="alabel" title="${esc(o.answer)}">${esc(o.answer.length>42?o.answer.slice(0,40)+'…':o.answer)}</div>
        <div class="atrack"><div class="afill" style="width:${Math.round(o.picked/max*100)}%;"></div></div>
        <div class="acount">${o.picked}</div>
        <div class="aconv">${o.booked>0?o.conv+'% book':''}</div>
      </div>`).join('') + `</div>`;
  }).join('') + `</div>`;
}
function errStepTbl(byStep){
  const rows = Object.entries(byStep||{}).sort((a,b)=>b[1]-a[1]);
  if(!rows.length) return `<div class="empty">No errors recorded. 🎉</div>`;
  return `<table><tr><th>Step</th><th class="num">Errors</th></tr>` +
    rows.map(([k,v])=>`<tr><td>${esc(k)}</td><td class="num">${v}</td></tr>`).join('') + `</table>`;
}
function errTbl(recent){
  if(!recent||!recent.length) return `<div class="empty">No errors recorded. 🎉</div>`;
  return `<table><tr><th>When</th><th>Type</th><th>Message</th></tr>` +
    recent.map(e=>`<tr><td style="white-space:nowrap;">${new Date(e.at).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</td>
      <td><span class="pill ${e.type==='booking_failed'?'red':'gray'}">${esc(e.type)}</span></td>
      <td>${esc(e.message||'—')}</td></tr>`).join('') + `</table>`;
}
function sessionsTbl(rows){
  if(!rows||!rows.length) return `<div class="empty">No sessions yet in this period.</div>`;
  return `<div style="overflow-x:auto;"><table><tr><th>When</th><th>Status</th><th>Got As Far As</th><th>Quoted/Paid</th><th>Device</th><th>Source</th><th>City</th><th>ZIP</th><th>Time Spent</th><th></th></tr>` +
    rows.map(s=>`<tr>
      <td style="white-space:nowrap;">${new Date(s.when).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</td>
      <td>${s.booked?'<span class="pill green">BOOKED</span>':(s.hadError?'<span class="pill red">error</span>':'<span class="pill gray">left</span>')}</td>
      <td>${esc(s.furthest)}</td>
      <td class="num">${s.value?fmt$(s.value):'—'}</td>
      <td>${esc(s.device||'—')}</td><td>${esc(s.source||'—')}</td>
      <td>${esc(s.city||'—')}</td><td>${esc(s.zip||'—')}</td>
      <td>${fmtDur(s.durationSec)}</td>
      <td>${s.isRepeat?'<span class="pill blue">repeat visitor</span>':''}</td>
    </tr>`).join('') + `</table></div>`;
}

function drawCharts(d){
  Object.values(charts).forEach(c=>c.destroy()); charts = {};
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const tl = document.getElementById('ch-timeline');
  if(tl) charts.tl = new Chart(tl, {
    type:'line',
    data:{ labels:d.timeline.map(x=>x.date.slice(5)),
      datasets:[
        { label:'Sessions', data:d.timeline.map(x=>x.sessions), borderColor:accent, backgroundColor:'transparent', tension:0.3 },
        { label:'Bookings', data:d.timeline.map(x=>x.bookings), borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.12)', fill:true, tension:0.3 },
      ]},
    options:{ maintainAspectRatio:false, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } }
  });
  const hr = document.getElementById('ch-hour');
  if(hr) charts.hr = new Chart(hr, {
    type:'bar',
    data:{ labels:d.byHour.map(x=>{const h=x.hour%12||12;return h+(x.hour<12?'a':'p');}),
      datasets:[
        { label:'Sessions', data:d.byHour.map(x=>x.sessions), backgroundColor:'rgba(255,102,0,0.35)' },
        { label:'Bookings', data:d.byHour.map(x=>x.bookings), backgroundColor:'#10b981' },
      ]},
    options:{ maintainAspectRatio:false, scales:{ x:{ stacked:false }, y:{ beginAtZero:true, ticks:{ precision:0 } } } }
  });
  const dw = document.getElementById('ch-dow');
  if(dw) charts.dw = new Chart(dw, {
    type:'bar',
    data:{ labels:d.byDow.map(x=>x.day),
      datasets:[
        { label:'Sessions', data:d.byDow.map(x=>x.sessions), backgroundColor:'rgba(255,102,0,0.35)' },
        { label:'Bookings', data:d.byDow.map(x=>x.bookings), backgroundColor:'#10b981' },
      ]},
    options:{ maintainAspectRatio:false, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } }
  });
}

load();
timer = setInterval(load, 30000);
</script>
</body>
</html>
