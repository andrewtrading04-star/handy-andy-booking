<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Request an Estimate</title>
<link rel="icon" type="image/svg+xml" href="/favicon-tech.svg">
<link rel="apple-touch-icon" href="/favicon-tech.svg">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --accent:#ff6600; --accent-soft:rgba(255,102,0,.10);
    --navy:#0a1628;
    --ink:#16181d; --ink-2:#3f4654; --mute:#8a909c;
    --line:#e7e9ee; --line2:#f1f2f5; --bg:#f5f6f8; --card:#fff;
    --radius:14px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;padding:18px;}
  .wrap{max-width:540px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 20px rgba(20,30,50,.06);overflow:hidden;}
  .trustbar{background:var(--navy);color:#fff;font-size:11px;padding:9px 14px;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;text-align:center;letter-spacing:.01em;}
  .trustbar b{color:var(--accent);font-weight:800;}
  .trustbar .dot{opacity:.45;}
  .progress{height:5px;background:var(--line2);}
  .progress .bar{height:100%;background:var(--accent);width:20%;transition:width .25s ease;}
  .pad{padding:22px 20px 20px;}
  .step-tag{font-size:12px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.7px;}
  h1{font-size:21px;font-weight:800;margin:6px 0 4px;line-height:1.25;color:var(--navy);}
  .sub{color:var(--ink-2);font-size:14px;margin-bottom:16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:13px 12px;text-align:left;cursor:pointer;font-size:14px;font-weight:700;color:var(--ink);transition:.12s;display:flex;align-items:flex-start;gap:10px;}
  .opt .opt-txt{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .opt small{font-weight:500;color:var(--mute);font-size:12px;line-height:1.4;}
  .opt:hover{border-color:var(--accent);}
  .opt.on{border-color:var(--accent);background:var(--accent-soft);}
  .opt-ic{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt-ic svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;}
  .opt.on .opt-ic{background:var(--accent);}
  .tvrow{margin-top:10px;background:var(--navy);border-radius:12px;padding:14px 15px;display:flex;align-items:center;gap:12px;text-decoration:none;cursor:pointer;}
  .tvrow .opt-ic{background:var(--accent);}
  .tvrow .opt-txt b{color:#fff;font-size:14px;font-weight:800;display:block;}
  .tvrow .opt-txt small{color:rgba(255,255,255,.65);font-size:12px;}
  .tvrow .pill{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:800;letter-spacing:.05em;padding:5px 10px;border-radius:20px;flex:0 0 auto;white-space:nowrap;}
  textarea,input[type=text],input[type=tel],input[type=email]{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:11px;color:var(--ink);padding:13px 14px;font-size:16px;font-family:inherit;}
  textarea{min-height:130px;resize:vertical;}
  textarea:focus,input:focus{outline:none;border-color:var(--accent);}
  label.fld{display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin:12px 0 6px;}
  label.fld .req{color:var(--accent);}
  .photo-drop{border:1.5px dashed var(--line);border-radius:12px;padding:26px 16px;text-align:center;color:var(--mute);font-size:14px;cursor:pointer;}
  .photo-drop:hover{border-color:var(--accent);color:var(--ink-2);}
  .photo-prev{position:relative;margin-top:6px;}
  .photo-prev img{width:100%;border-radius:12px;border:1px solid var(--line);display:block;}
  .photo-prev .rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;}
  .dates{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
  .date-pill{flex:0 0 auto;background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:9px 12px;text-align:center;cursor:pointer;min-width:58px;}
  .date-pill .dow{font-size:11px;font-weight:700;color:var(--mute);text-transform:uppercase;}
  .date-pill .d{font-size:17px;font-weight:800;}
  .date-pill.on{border-color:var(--accent);background:var(--accent-soft);}
  .windows{display:grid;gap:8px;margin-top:12px;}
  .win{background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
  .win:hover{border-color:var(--accent);}
  .win.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}
  .win.disabled{opacity:.45;cursor:not-allowed;}
  .sel-list{margin-top:14px;display:flex;flex-direction:column;gap:7px;}
  .sel-row{display:flex;align-items:center;gap:8px;background:var(--line2);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;}
  .sel-row .x{margin-left:auto;background:none;border:none;color:var(--mute);font-size:17px;cursor:pointer;line-height:1;}
  .count{font-size:12px;font-weight:700;color:var(--mute);margin-top:10px;}
  .consent{display:flex;align-items:flex-start;gap:10px;background:var(--line2);border-radius:11px;padding:12px 14px;margin-top:14px;}
  .consent input{width:20px;height:20px;accent-color:var(--accent);margin-top:1px;flex-shrink:0;cursor:pointer;}
  .consent label{font-size:13px;color:var(--ink-2);cursor:pointer;}
  .nav{display:flex;gap:10px;margin-top:20px;}
  .btn{flex:1;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#fff;}
  .btn.primary:disabled{background:#d8dbe1;color:#fff;cursor:not-allowed;}
  .btn.ghost{flex:0 0 auto;background:var(--line2);color:var(--ink-2);padding:14px 18px;}
  .err{background:#fee2e2;color:#b91c1c;border-radius:10px;padding:11px 13px;font-size:13px;margin-top:14px;display:none;}
  .done{text-align:center;padding:18px 6px;}
  .done .check{width:66px;height:66px;border-radius:50%;background:#dcfce7;color:#15803d;display:flex;align-items:center;justify-content:center;font-size:34px;margin:6px auto 16px;}
  .done h1{font-size:22px;}
  .foot{text-align:center;color:var(--mute);font-size:12px;margin-top:16px;}
  .loading{text-align:center;color:var(--mute);padding:40px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="trustbar" id="trustbar"><b>Licensed &amp; Insured</b><span class="dot">·</span><span>Highly rated locally</span><span class="dot">·</span><span>Serving your area</span></div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="pad" id="pad">
      <div class="loading" id="boot">Loading…</div>
    </div>
  </div>
  <div class="foot">We'll review your request and reach out to schedule. No charge to ask.</div>
</div>

<svg style="display:none">
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/></symbol>
  <symbol id="i-box" viewBox="0 0 24 24"><path d="M4 8l8-4 8 4-8 4-8-4Z"/><path d="M4 8v8l8 4 8-4V8"/><path d="M12 12v8"/></symbol>
  <symbol id="i-frame" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="1"/><rect x="8" y="8" width="8" height="8" rx=".5"/></symbol>
  <symbol id="i-drop" viewBox="0 0 24 24"><path d="M12 3s6.5 7.5 6.5 12A6.5 6.5 0 1 1 5.5 15C5.5 10.5 12 3 12 3Z"/></symbol>
  <symbol id="i-signal" viewBox="0 0 24 24"><path d="M4 12l8-7 8 7"/><path d="M8.5 13.5a5 5 0 0 1 7 0"/><circle cx="12" cy="17" r="1"/></symbol>
  <symbol id="i-patch" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 16l8-8"/></symbol>
  <symbol id="i-bulb" viewBox="0 0 24 24"><circle cx="12" cy="10" r="6"/><path d="M9.5 20h5M10 22h4"/><path d="M12 4V2"/></symbol>
  <symbol id="i-tv" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="12" rx="1.5"/><path d="M9 21h6M12 17v4"/></symbol>
  <symbol id="i-tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5.4 4.6L4 16.2V20h3.8l5.3-5.3a4 4 0 0 0 4.6-5.4l-2.6 2.6-2-2 2.6-2.6Z"/></symbol>
</svg>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const SLUG = (params.get('b') || params.get('business') || 'handy-andy').toLowerCase();
const ACCENTS = { 'handy-andy':'#ff6600', 'doms':'#2563eb' };
if (ACCENTS[SLUG]) document.documentElement.style.setProperty('--accent', ACCENTS[SLUG]);
document.documentElement.style.setProperty('--accent-soft', hexToSoft(getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()));

// "Book now" destination for the TV Mounting tile, per business. The tile links
// straight to the booking page instead of continuing the estimate flow.
// target="_top" so an embedding iframe navigates the whole page.
const BOOK_URLS = { 'handy-andy':'https://www.ihandyandy.com/book', 'doms':'https://www.domstvmounting.com/book' };
const BOOK_URL = BOOK_URLS[SLUG] || '';

// Trust-bar copy, per business — same pattern as ACCENTS/BOOK_URLS above. Kept
// generic on purpose (no invented review counts or years-in-business) so it's
// truthful for any business using this widget without per-business edits.
const TRUST_LINES = {
  'handy-andy': ['Licensed &amp; Insured', 'Highly rated locally', 'Serving your area'],
  'doms':       ['Licensed &amp; Insured', 'Highly rated locally', 'Serving your area'],
};
function renderTrustBar(){
  const parts = TRUST_LINES[SLUG] || TRUST_LINES['handy-andy'];
  const el = document.getElementById('trustbar');
  if(!el) return;
  el.innerHTML = `<b>${parts[0]}</b>` + parts.slice(1).map(p=>`<span class="dot">·</span><span>${p}</span>`).join('');
}

// Best-effort icon for a service tile, matched by keyword so it degrades
// gracefully for any business's actual (server-driven) service list instead
// of assuming Handy Andy's exact category names.
function serviceIcon(name){
  const n = (name||'').toLowerCase();
  if(/furniture|assembl|flat-?pack/.test(n)) return 'i-box';
  if(/\bart\b|mirror|shelv|shelf|frame/.test(n)) return 'i-frame';
  if(/plumb|faucet|leak|drain|pipe/.test(n)) return 'i-drop';
  if(/smart|camera|doorbell|thermostat|\bhub\b/.test(n)) return 'i-signal';
  if(/drywall|patch|wall repair/.test(n)) return 'i-patch';
  if(/electric|\blight/.test(n) || /fixture|switch|outlet|\bfan\b/.test(n)) return 'i-bulb';
  if(/\btv\b|television/.test(n)) return 'i-tv';
  if(/home repair|general repair|handyman|fix.?it/.test(n)) return 'i-home';
  return 'i-tool';
}

const WINDOWS = [
  { key:'s1', label:'8:00 AM – 10:00 AM' },
  { key:'s2', label:'11:00 AM – 1:00 PM' },
  { key:'s3', label:'2:00 PM – 4:00 PM' },
  { key:'s4', label:'5:00 PM – 8:00 PM' },
  { key:'s5', label:'8:00 PM – 10:30 PM' },
];
const TOTAL_STEPS = 5;
const MAX_SLOTS = 5;

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  step: 0,
  services: [],
  serviceId: null, serviceLabel: null,
  description: '',
  image: null,            // compressed data URL
  activeDate: null,       // 'YYYY-MM-DD' currently expanded in the picker
  slots: [],              // [{date, slot_key, label}]
  name: '', phone: '', email: '', zip: '',
  consent: true,
};

// ── Analytics tracking → /api/log-event ──────────────────────────────────────
// Mirrors the TV-mounting booking widget, but tags events as "<slug>-handyman"
// so the dashboard's Handyman Analytics page can report on this widget alone.
const WIDGET = SLUG + '-handyman';
function _uuid(){ try{ return crypto.randomUUID(); }catch(_){ return 'x'+Math.random().toString(36).slice(2)+Date.now().toString(36); } }
let _vid=''; try{ _vid=localStorage.getItem('ha_vid')||''; if(!_vid){ _vid=_uuid(); localStorage.setItem('ha_vid',_vid); } }catch(_){ _vid=_uuid(); }
const SESSION_ID = _vid + '.' + _uuid();
const DEVICE = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
const TRAFFIC_SOURCE = (function(){
  try{
    const utm = params.get('utm_source'); if(utm) return utm.slice(0,60);
    if(document.referrer){
      const h = new URL(document.referrer).hostname.replace(/^www\./,'');
      if(h && h !== location.hostname.replace(/^www\./,'')) return h;
    }
  }catch(_){}
  return 'direct';
})();
function logEvent(ev){
  try{
    fetch('/api/log-event',{
      method:'POST', headers:{'Content-Type':'application/json'}, keepalive:true,
      body: JSON.stringify({
        session_id: SESSION_ID, widget: WIDGET,
        event_type: ev.event_type, step_name: ev.step_name, value: ev.value,
        device_type: DEVICE, traffic_source: TRAFFIC_SOURCE,
        zip_code: (state.zip||'').trim() || undefined,
        customer_name: ev.customer_name, error_message: ev.error_message,
      }),
    }).catch(()=>{});
  }catch(_){}
}
const STEP_KEYS = ['service','describe','photo','times','contact'];
let _lastTracked = -1;
function trackStep(){
  if(state.step === _lastTracked) return;
  _lastTracked = state.step;
  logEvent({ event_type:'step_view', step_name: STEP_KEYS[state.step] || ('step'+state.step), value: state.step });
}

// ── Boot ─────────────────────────────────────────────────────────────────────
renderTrustBar();
(async function boot(){
  try{
    const r = await fetch(`/api/estimate?action=services&business=${encodeURIComponent(SLUG)}`);
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Could not load services');
    state.services = d.services || [];
    if(d.business?.name) document.title = d.business.name;
    render();
  }catch(e){
    document.getElementById('pad').innerHTML = `<div class="err" style="display:block;">${esc(e.message)}</div>`;
  }
})();

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('bar').style.width = ((state.step+1)/TOTAL_STEPS*100)+'%';
  const pad = document.getElementById('pad');
  if(state.step===0)      pad.innerHTML = stepService();
  else if(state.step===1) pad.innerHTML = stepDescribe();
  else if(state.step===2) pad.innerHTML = stepPhoto();
  else if(state.step===3) pad.innerHTML = stepTimes();
  else if(state.step===4) pad.innerHTML = stepContact();
  wire();
  trackStep();
  postHeight();
}

// Report our height to a parent page so an embedding <iframe> can auto-resize.
function postHeight(){
  try{ const h=document.body.scrollHeight; parent.postMessage({ type:'estimate-height', height:h }, '*'); }catch(e){}
}
window.addEventListener('resize', postHeight);

function shell(tag, title, sub, inner, opts={}){
  const back = state.step>0 ? `<button class="btn ghost" id="back">Back</button>` : '';
  const nextLabel = opts.nextLabel || (state.step===TOTAL_STEPS-1 ? 'Submit request' : 'Continue');
  const next = `<button class="btn primary" id="next" ${opts.nextDisabled?'disabled':''}>${nextLabel}</button>`;
  const nav = opts.hideNav ? '' : `<div class="nav">${back}${next}</div>`;
  return `<div class="step-tag">Step ${state.step+1} of ${TOTAL_STEPS} · ${tag}</div>
    <h1>${title}</h1>${sub?`<div class="sub">${sub}</div>`:''}
    ${inner}<div class="err" id="err"></div>${nav}`;
}

function stepService(){
  const opts = state.services.map(s =>
    `<button type="button" class="opt ${state.serviceId===s.id?'on':''}" data-svc="${s.id}" data-label="${esc(s.name)}">
      <span class="opt-ic"><svg><use href="#${serviceIcon(s.name)}"/></svg></span>
      <span class="opt-txt"><span>${esc(s.name)}</span>${s.description?`<small>${esc(s.description)}</small>`:''}</span>
    </button>`).join('');
  const grid = state.services.length ? `<div class="grid">${opts}</div>` : '';
  // TV Mounting is a distinct instant-book row (not an estimate-flow tile) —
  // styled to stand apart since tapping it leaves the estimate flow entirely.
  const tvm = BOOK_URL
    ? `<a class="tvrow" href="${BOOK_URL}" target="_top" rel="noopener">
      <span class="opt-ic"><svg><use href="#i-tv"/></svg></span>
      <span class="opt-txt"><b>TV Mounting</b><small>Skip the estimate — book an install instantly</small></span>
      <span class="pill">Book now</span>
    </a>`
    : '';
  const inner = (state.services.length || tvm) ? `${grid}${tvm}`
    : `<div class="sub">No services available right now. Please call us instead.</div>`;
  return shell('Service', 'What do you need help with?', 'Choose the type of work.', inner,
    { nextDisabled: !state.serviceId });
}

function stepDescribe(){
  const inner = `<textarea id="desc" placeholder="Describe what you need done — the more detail, the better the estimate. (e.g. 'Mount a 65&quot; TV above the fireplace and hide the wires.')">${esc(state.description)}</textarea>`;
  return shell('Details', 'What can we help you with?', 'Describe the job in your own words — the more detail, the better the estimate.', inner,
    { nextDisabled: state.description.trim().length===0 });
}

function stepPhoto(){
  const prev = state.image
    ? `<div class="photo-prev"><img src="${state.image}" alt="preview"><button type="button" class="rm" id="rmPhoto">×</button></div>`
    : `<div class="photo-drop" id="drop">📷 Tap to add a photo<br><small>Helps us understand the job (optional)</small></div>`;
  return shell('Photo', 'Add a photo', 'Optional — a picture of the spot or item helps a lot.',
    `${prev}<input type="file" id="file" accept="image/*" style="display:none">`,
    { nextLabel:'Continue' });
}

function stepTimes(){
  const dates = upcomingDates(14);
  const datePills = dates.map(d =>
    `<div class="date-pill ${state.activeDate===d.iso?'on':''}" data-date="${d.iso}">
       <div class="dow">${d.dow}</div><div class="d">${d.day}</div>
     </div>`).join('');
  let windows = '';
  if(state.activeDate){
    windows = `<div class="windows">` + WINDOWS.map(w=>{
      const on = state.slots.some(s=>s.date===state.activeDate && s.slot_key===w.key);
      const full = !on && state.slots.length>=MAX_SLOTS;
      return `<div class="win ${on?'on':''} ${full?'disabled':''}" data-win="${w.key}" data-label="${esc(w.label)}">
        <span>${w.label}</span><span>${on?'✓':'+'}</span></div>`;
    }).join('') + `</div>`;
  }
  const list = state.slots.length
    ? `<div class="sel-list">` + state.slots.map((s,i)=>
        `<div class="sel-row"><span>${esc(slotDateLabel(s.date))} · ${esc(s.label)}</span>
         <button type="button" class="x" data-rm="${i}">×</button></div>`).join('') + `</div>`
    : '';
  const inner = `<div class="dates">${datePills}</div>${windows}${list}
    <div class="count">${state.slots.length} of ${MAX_SLOTS} selected${state.activeDate?'':' · pick a day above'}</div>`;
  return shell('Timing', 'When works for you?', 'Pick up to 5 time windows you’d prefer. We’ll confirm one.', inner,
    { nextLabel:'Continue' });
}

function stepContact(){
  const inner = `
    <label class="fld">Your name <span class="req">*</span></label>
    <input type="text" id="cname" value="${esc(state.name)}" placeholder="Full name" autocomplete="name">
    <label class="fld">Phone <span class="req">*</span></label>
    <input type="tel" id="cphone" value="${esc(state.phone)}" placeholder="(555) 555-5555" autocomplete="tel">
    <label class="fld">Email</label>
    <input type="email" id="cemail" value="${esc(state.email)}" placeholder="you@email.com (optional)" autocomplete="email">
    <label class="fld">Zip code <span class="req">*</span></label>
    <input type="text" id="czip" value="${esc(state.zip)}" placeholder="e.g. 80203" inputmode="numeric" maxlength="5" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,5)" autocomplete="postal-code">
    <div class="consent">
      <input type="checkbox" id="consent" ${state.consent?'checked':''}>
      <label for="consent">Text me updates about this estimate (scheduling, confirmations). Msg &amp; data rates may apply. Reply STOP to opt out.</label>
    </div>`;
  return shell('Contact', 'Where should we reach you?', '', inner,
    { nextLabel:'Submit request', nextDisabled: !(state.name.trim() && state.phone.trim() && state.zip.trim()) });
}

// ── Wiring ───────────────────────────────────────────────────────────────────
function wire(){
  const back = document.getElementById('back');
  const next = document.getElementById('next');
  if(back) back.onclick = ()=>{ state.step=Math.max(0,state.step-1); render(); };
  if(next) next.onclick = onNext;

  if(state.step===0){
    document.querySelectorAll('[data-svc]').forEach(b=>b.onclick=()=>{
      state.serviceId=b.dataset.svc; state.serviceLabel=b.dataset.label;
      logEvent({ event_type:'answer', step_name:'service:'+b.dataset.label });
      render();
    });
  }
  if(state.step===1){
    const t=document.getElementById('desc');
    t.oninput=()=>{ state.description=t.value; document.getElementById('next').disabled=t.value.trim().length===0; };
  }
  if(state.step===2){
    const drop=document.getElementById('drop'), file=document.getElementById('file'), rm=document.getElementById('rmPhoto');
    if(drop) drop.onclick=()=>file.click();
    if(rm) rm.onclick=()=>{ state.image=null; render(); };
    if(file) file.onchange=async()=>{
      const f=file.files&&file.files[0]; if(!f) return;
      try{ showErr(''); state.image=await compressImage(f); render(); }
      catch(e){ showErr(e.message||'Could not read that image.'); }
    };
  }
  if(state.step===3){
    document.querySelectorAll('[data-date]').forEach(p=>p.onclick=()=>{ state.activeDate=p.dataset.date; render(); });
    document.querySelectorAll('[data-win]').forEach(w=>w.onclick=()=>{
      if(w.classList.contains('disabled')) return;
      toggleSlot(state.activeDate, w.dataset.win, w.dataset.label); render();
    });
    document.querySelectorAll('[data-rm]').forEach(x=>x.onclick=()=>{ state.slots.splice(Number(x.dataset.rm),1); render(); });
  }
  if(state.step===4){
    const n=document.getElementById('cname'), p=document.getElementById('cphone'), e=document.getElementById('cemail'), z=document.getElementById('czip'), c=document.getElementById('consent');
    const upd=()=>{ state.name=n.value; state.phone=p.value; state.email=e.value; state.zip=z.value; state.consent=c.checked;
      document.getElementById('next').disabled=!(n.value.trim()&&p.value.trim()&&z.value.trim()); };
    n.oninput=upd; p.oninput=upd; e.oninput=upd; z.oninput=upd; c.onchange=upd;
  }
}

function onNext(){
  showErr('');
  if(state.step===0 && !state.serviceId) return showErr('Please pick a service.');
  if(state.step===1 && !state.description.trim()) return showErr('Please describe the job.');
  if(state.step===4) return submit();
  state.step++; render();
}

function toggleSlot(date, key, label){
  const i=state.slots.findIndex(s=>s.date===date && s.slot_key===key);
  if(i>=0){ state.slots.splice(i,1); return; }
  if(state.slots.length>=MAX_SLOTS) return;
  state.slots.push({ date, slot_key:key, label });
}

// ── Submit ───────────────────────────────────────────────────────────────────
async function submit(){
  const next=document.getElementById('next');
  next.disabled=true; next.textContent='Sending…';
  try{
    const r=await fetch('/api/estimate?action=submit',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        business:SLUG,
        service_id:state.serviceId, service_label:state.serviceLabel,
        description:state.description.trim(),
        image:state.image||undefined,
        preferred_slots:state.slots,
        customer:{ name:state.name.trim(), phone:state.phone.trim(), email:state.email.trim()||undefined, zip:state.zip.trim()||undefined },
        sms_consent:state.consent,
      }),
    });
    const d=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(d.error||'Something went wrong. Please try again.');
    logEvent({ event_type:'booking_confirmed', step_name:'contact', value:state.slots.length, customer_name:state.name.trim() });
    success();
  }catch(e){
    logEvent({ event_type:'booking_failed', step_name:'contact', error_message:e.message });
    next.disabled=false; next.textContent='Submit request';
    showErr(e.message);
  }
}

function success(){
  document.getElementById('bar').style.width='100%';
  document.getElementById('pad').innerHTML=`
    <div class="done">
      <div class="check">✓</div>
      <h1>Request received!</h1>
      <div class="sub" style="margin-top:8px;">Thanks, ${esc(state.name.trim().split(' ')[0]||'')}! We got your estimate request and will reach out shortly to confirm a time.</div>
      <button class="btn primary" style="margin-top:18px;" onclick="location.reload()">Submit another</button>
    </div>`;
  postHeight();
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function showErr(msg){ const e=document.getElementById('err'); if(!e) return; e.textContent=msg; e.style.display=msg?'block':'none'; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function hexToSoft(hex){ const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex||''); if(!m) return 'rgba(255,102,0,.10)'; return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},.10)`; }

function upcomingDates(n){
  const out=[]; const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<n;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    out.push({ iso:d.toLocaleDateString('en-CA'),
      dow:d.toLocaleDateString('en-US',{weekday:'short'}),
      day:d.getDate() });
  }
  return out;
}
function slotDateLabel(iso){ try{ return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }catch{ return iso; } }

// Resize/compress on-device so uploads stay small & fast (mirrors the tech app).
function compressImage(file, maxDim=1600, quality=0.8){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width,h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality)); };
      img.onerror=()=>reject(new Error('That file is not a valid image.'));
      img.src=reader.result; };
    reader.onerror=()=>reject(new Error('Could not read that file.'));
    reader.readAsDataURL(file);
  });
}
