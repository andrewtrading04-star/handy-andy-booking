<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Yin-yang: Handy Andy orange + Dom's blue. One badge for the whole operation. -->
  <!-- Blue half = full circle base -->
  <circle cx="50" cy="50" r="49" fill="#2563eb"/>
  <!-- Orange half = right lobe + lower swirl -->
  <path d="M50,1 a49,49 0 0,1 0,98 a24.5,24.5 0 0,1 0,-49 a24.5,24.5 0 0,0 0,-49 z" fill="#ff6600"/>
  <!-- Eyes: opposite-color dots in each lobe -->
  <circle cx="50" cy="25.5" r="8" fill="#ff6600"/>
  <circle cx="50" cy="74.5" r="8" fill="#2563eb"/>
  <!-- Thin ring for definition on light/dark tabs -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
</svg>
